<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a1a;--bg2:#0f172a;--card:#141432;--card-hover:#1a1a3e;
  --border:#1e293b;--text:#e8e8f4;--text2:#a0a0b8;--text3:#666680;
  --primary:#00d4aa;--primary-light:#00e6b8;--cyan:#6366f1;--green:#22c55e;
  --red:#ef4444;--gold:#f59e0b;--orange:#f97316;
  --sidebar-w:260px;--radius:12px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --gradient:linear-gradient(135deg,#00d4aa,#6366f1);
  --glass-bg:rgba(15,23,42,.6);--glass-border:rgba(0,212,170,.1);
}
[data-theme="light"]{
  --bg:#f4f4f8;--bg2:#eaeaf0;--card:#ffffff;--card-hover:#f8f8fc;
  --border:#d0d0dc;--text:#111128;--text2:#44445e;--text3:#77778e;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --primary:#00b894;--primary-light:#00a383;
  --glass-bg:rgba(255,255,255,.8);--glass-border:rgba(0,184,148,.15);
}
[data-theme="light"] .card{box-shadow:var(--shadow)}
[data-theme="light"] #sidebar{box-shadow:1px 0 8px rgba(0,0,0,.04)}
[data-theme="light"] .stat-card .stat-value{filter:saturate(1.2)}
[data-theme="light"] .badge-green{background:rgba(34,197,94,.1);color:#16a34a}
[data-theme="light"] .badge-gold{background:rgba(245,166,35,.1);color:#b97a10}
[data-theme="light"] .badge-cyan{background:rgba(6,182,212,.1);color:#0891b2}
[data-theme="light"] .progress-bar{background:#e0e0ec}
html{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{display:flex;min-height:100vh;overflow-x:hidden}
a{color:var(--primary-light);text-decoration:none}
a:hover{text-decoration:underline}
input,select,textarea,button{font-family:inherit;font-size:inherit}
code,.mono{font-family:'JetBrains Mono','SF Mono',Consolas,'Courier New',monospace;font-size:.85em}

/* Sidebar */
#sidebar{
  width:var(--sidebar-w);min-height:100vh;background:var(--bg2);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  position:fixed;left:0;top:0;z-index:100;transition:transform .2s;
}
#sidebar .logo{
  padding:24px 20px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);
}
#sidebar .logo svg{width:36px;height:36px;flex-shrink:0}
#sidebar .logo span{font-size:1.3em;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#sidebar nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px}
#sidebar nav a{
  display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);
  color:var(--text2);transition:all .15s;font-weight:500;font-size:.95em;
}
#sidebar nav a:hover{background:var(--card);color:var(--text);text-decoration:none}
#sidebar nav a.active{background:var(--primary);color:#fff}
#sidebar nav a.active:hover{background:var(--primary-light)}
#sidebar nav a svg{width:18px;height:18px;flex-shrink:0;opacity:.7}
#sidebar nav a.active svg{opacity:1}
#sidebar .sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}

/* Theme toggle */
.theme-toggle{
  display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);
  background:var(--card);border:1px solid var(--border);cursor:pointer;color:var(--text2);
  font-size:.85em;transition:all .15s;
}
.theme-toggle:hover{border-color:var(--primary);color:var(--text)}
.theme-toggle svg{width:16px;height:16px}

/* Main */
#main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;padding:24px 36px 48px}
.page-header{margin-bottom:24px}
.page-header h1{font-size:1.5em;font-weight:700}
.page-header p{color:var(--text2);margin-top:4px}

/* Status dot */
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.green{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-dot.red{background:var(--red);box-shadow:0 0 8px var(--red)}
.status-dot.gold{background:var(--gold);box-shadow:0 0 8px var(--gold)}

/* Cards */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;transition:border-color .15s;
}
.card:hover{border-color:color-mix(in srgb,var(--primary) 40%,transparent)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat-card{text-align:center;padding:24px 16px}
.stat-card .stat-value{font-family:'Space Grotesk','DM Sans',sans-serif;font-size:1.8em;font-weight:700;margin:8px 0 4px;font-variant-numeric:tabular-nums;font-feature-settings:'tnum';transition:color .3s}
.stat-card .stat-label{color:var(--text2);font-size:.82em;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.stat-card .stat-sub{color:var(--text3);font-size:.78em;margin-top:4px}
h1,.section-title{font-family:'Space Grotesk','DM Sans',sans-serif;letter-spacing:-.01em}
#content{max-width:1400px;margin:0 auto;width:100%}

/* Progress bar */
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-bar .fill{height:100%;background:var(--gradient);border-radius:4px;transition:width .8s ease}

/* Tables */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:24px}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{text-align:left;padding:12px 16px;font-size:.8em;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg2)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.9em}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--card-hover)}

/* Forms */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85em;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);transition:border-color .15s;
}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--primary)}
.form-group input::placeholder{color:var(--text3)}
.form-group .hint{font-size:.78em;color:var(--text3);margin-top:4px}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);
  font-weight:600;border:none;cursor:pointer;transition:all .15s;font-size:.9em;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-light)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--primary)}
.btn-sm{padding:6px 14px;font-size:.82em}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.85}

/* Badge */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75em;font-weight:600}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}
.badge-gold{background:rgba(245,166,35,.15);color:var(--gold)}
.badge-cyan{background:rgba(6,182,212,.15);color:var(--cyan)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}

/* Alert */
.alert{padding:14px 18px;border-radius:var(--radius-sm);marginmargin-bottom:16px;font-size:.9em}
.alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green)}
.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.alert-info{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);color:var(--primary-light)}

/* Copy button */
.copyable{position:relative;cursor:pointer}
.copyable:hover{opacity:.85}
.copy-toast{
  position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;
  padding:10px 20px;border-radius:var(--radius-sm);font-size:.85em;font-weight:600;
  transform:translateY(80px);opacity:0;transition:all .25s;z-index:999;
}
.copy-toast.show{transform:translateY(0);opacity:1}

/* JSON viewer */
.json-view{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:16px;overflow-x:auto;white-space:pre-wrap;font-family:'JetBrains Mono','SF Mono',Consolas,monospace;
  font-size:.82em;line-height:1.6;max-height:400px;overflow-y:auto;
}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px;padding-bottom:0}
.tab{
  padding:10px 18px;cursor:pointer;color:var(--text2);font-weight:500;font-size:.9em;
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Responsive */
#mobile-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;padding:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;color:var(--text)}
#mobile-backdrop{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.5)}
.inline-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar.open~#mobile-backdrop{display:block}
  #main{margin-left:0;padding:16px}
  #mobile-toggle{display:block}
  .cards-grid{grid-template-columns:1fr}
  .inline-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .stat-card .stat-value{font-size:1.3em}
  .page-header h1{font-size:1.2em}
  #main{padding:12px}
  .card{padding:14px}
}

/* Skeleton animation */
.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--card) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;height:1.2em;display:inline-block;width:80px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Fade-in for page transitions */
.page{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Two-col layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* Section */
.section-title{font-size:1.1em;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* Mining animation */
@keyframes pulse-glow{0%,100%{box-shadow:0 0 8px var(--green)}50%{box-shadow:0 0 20px var(--green)}}
.mining-active{animation:pulse-glow 2s infinite}

/* Glassmorphism card */
.glass-card{background:var(--glass-bg);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:20px;transition:border-color .2s}
.glass-card:hover{border-color:rgba(0,212,170,.3)}
.glass-stat{text-align:center;padding:24px 16px}
.glass-stat .stat-value{font-family:'Space Grotesk','DM Sans',sans-serif;font-size:1.8em;font-weight:700;margin:8px 0 4px;color:var(--primary);font-variant-numeric:tabular-nums}
.glass-stat .stat-label{color:var(--text2);font-size:.82em;text-transform:uppercase;letter-spacing:.08em;font-weight:500}

/* Service/marketplace cards */
.service-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:24px}
.service-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s}
.service-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.service-card .price{font-family:'Space Grotesk',sans-serif;font-size:1.3em;font-weight:700;color:var(--primary)}
.service-card .category{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72em;font-weight:600;background:rgba(0,212,170,.1);color:var(--primary)}

/* Order book */
.order-book{display:grid;grid-template-columns:1fr 1fr;gap:0;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.order-book .bids,.order-book .asks{padding:0}
.order-book .bids{background:rgba(34,197,94,.03)}
.order-book .asks{background:rgba(239,68,68,.03)}
.order-row{display:flex;justify-content:space-between;padding:6px 12px;font-size:.85em;font-family:'JetBrains Mono',monospace}
.order-row:hover{background:rgba(255,255,255,.03)}
.order-row .price-bid{color:var(--green)}
.order-row .price-ask{color:var(--red)}

/* Proposal card */
.proposal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;transition:border-color .2s}
.proposal-card:hover{border-color:var(--primary)}
.proposal-card .votes-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--border);margin-top:12px}
.proposal-card .votes-for{background:var(--green);height:100%}
.proposal-card .votes-against{background:var(--red);height:100%}
</style>
</head>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      Trade
    </a>
    <a href="#lottery" data-page="lottery">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8l-4 4-4-4"/><path d="M8 16l4-4 4 4"/></svg>
      Lottery
    </a>
    <a href="#history" data-page="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      History
    </a>
    <a href="#marketplace" data-page="marketplace">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Marketplace
    </a>
    <a href="#governance" data-page="governance">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Governance
    </a>
    <a href="#exchange" data-page="exchange">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
      Exchange
    </a>
    <a href="#help" data-page="help">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Help
    </a>
  </nav>
  <div class="sidebar-footer">
    <div style="display:flex;align-items:center;gap:6px;font-size:.82em;color:var(--text3)">
      <span class="status-dot green" id="status-dot"></span>
      <span id="node-status-text">Connected</span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">
      <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <span id="theme-label">Light Mode</span>
    </button>
  </div>
</aside>

<main id="main">
  <div id="content"></div>
</main>

<div class="copy-toast" id="copy-toast">Copied!</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
const S = {
  status: null, mining: null, mempool: null, health: null, myAccount: null,
  history: null, lottery: null, marketplace: null, proposals: null, orderbook: null,
  lastUpdate: 0, connected: false, page: 'dashboard',
};
const API = location.origin;
const TOTAL_SUPPLY = 1000000000; // 1 billion BAUD
const QUANTA_PER_BAUD = 1000000000000000000n; // 10^18

// ─── Helpers ────────────────────────────────────────────────────────────────
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function fmt(n) {
  if (n === undefined || n === null) return '—';
  return Number(n).toLocaleString();
}

function fmtBaud(quanta) {
  if (!quanta) return '0';
  const b = BigInt(quanta);
  const whole = b / QUANTA_PER_BAUD;
  const frac = b % QUANTA_PER_BAUD;
  if (frac === 0n) return whole.toLocaleString();
  const fracStr = frac.toString().padStart(18,'0').replace(/0+$/,'');
  return `${whole.toLocaleString()}.${fracStr.slice(0,6)}`;
}

function fmtUptime(ms) {
  if (!ms) return '0s';
  const s = Math.floor(ms/1000), m = Math.floor(s/60), h = Math.floor(m/60), d = Math.floor(h/24);
  if (d > 0) return `${d}d ${h%24}h ${m%60}m`;
  if (h > 0) return `${h}h ${m%60}m ${s%60}s`;
  if (m > 0) return `${m}m ${s%60}s`;
  return `${s}s`;
}

function shortAddr(a) {
  if (!a || a.length < 16) return a || '';
  return a.slice(0,8) + '…' + a.slice(-8);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const t = $('#copy-toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── API Fetchers ───────────────────────────────────────────────────────────
async function fetchJSON(path) {
  try {
    const r = await fetch(API + path);
    if (!r.ok) throw new Error(r.statusText);
    return await r.json();
  } catch(e) { return null; }
}

async function refreshData() {
  const [status, mining, mempool, health] = await Promise.all([
    fetchJSON('/v1/status'),
    fetchJSON('/v1/mining'),
    fetchJSON('/v1/mempool'),
    fetchJSON('/v1/health'),
  ]);
  S.status = status;
  S.mining = mining;
  S.mempool = mempool;
  S.health = health;
  S.connected = !!status;
  S.lastUpdate = Date.now();

  // Fetch validator's own account balance
  if (status && status.node_address) {
    S.myAccount = await fetchJSON('/v1/account/' + status.node_address);
  }

  // Fetch history and lottery if on those pages
  if (S.page === 'faucet' || S.page === 'trade' || S.page === 'dashboard' || S.page === 'history') {
    const histData = await fetchJSON('/v1/history');
    S.history = histData ? histData.transactions : [];
  }
  if (S.page === 'lottery') {
    S.lottery = await fetchJSON('/v1/lottery');
  }
  if (S.page === 'marketplace') {
    S.marketplace = await fetchJSON('/v1/marketplace') || [];
  }
  if (S.page === 'governance') {
    S.proposals = await fetchJSON('/v1/proposals') || [];
  }
  if (S.page === 'exchange') {
    S.orderbook = await fetchJSON('/v1/exchange/orderbook') || { bids: [], asks: [] };
  }

  const dot = $('#status-dot');
  const txt = $('#node-status-text');
  if (S.connected) {
    dot.className = 'status-dot green';
    txt.textContent = `Block #${fmt(status.height)}`;
  } else {
    dot.className = 'status-dot red';
    txt.textContent = 'Disconnected';
  }

  // Only do full innerHTML render on first load or page change
  // Otherwise do targeted DOM updates to avoid flashing
  if (S._renderedPage !== S.page) {
    renderPage();
  } else {
    updateLiveData();
  }
}

// ─── Router ─────────────────────────────────────────────────────────────────
function navigate(page) {
  S.page = page;
  S._renderedPage = null; // Force full re-render on navigation
  $$('#nav a').forEach(a => a.classList.toggle('active', a.dataset.page === page));
  renderPage();
}

window.addEventListener('hashchange', () => {
  const p = location.hash.slice(1) || 'dashboard';
  navigate(p);
});

// ─── Theme ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  localStorage.setItem('baud-theme', next);
  updateThemeUI();
}

function updateThemeUI() {
  const dark = document.documentElement.dataset.theme === 'dark';
  $('#theme-icon-dark').style.display = dark ? '' : 'none';
  $('#theme-icon-light').style.display = dark ? 'none' : '';
  $('#theme-label').textContent = dark ? 'Light Mode' : 'Dark Mode';
}

// ─── Page Renderers ─────────────────────────────────────────────────────────
function renderPage() {
  const c = $('#content');
  switch(S.page) {
    case 'dashboard': c.innerHTML = renderDashboard(); break;
    case 'mining': c.innerHTML = renderMining(); break;
    case 'wallet': c.innerHTML = renderWallet(); break;
    case 'send': c.innerHTML = renderSend(); break;
    case 'accounts': c.innerHTML = renderAccounts(); break;
    case 'mempool': c.innerHTML = renderMempool(); break;
    case 'node': c.innerHTML = renderNode(); break;
    case 'explorer': c.innerHTML = renderExplorer(); break;
    case 'agents': c.innerHTML = renderAgents(); break;
    case 'faucet': c.innerHTML = renderFaucet(); break;
    case 'trade': c.innerHTML = renderTrade(); break;
    case 'lottery': c.innerHTML = renderLottery(); break;
    case 'history': c.innerHTML = renderHistory(); break;
    case 'marketplace': c.innerHTML = renderMarketplace(); break;
    case 'governance': c.innerHTML = renderGovernance(); break;
    case 'exchange': c.innerHTML = renderExchange(); break;
    case 'help': c.innerHTML = renderHelp(); break;
    default: c.innerHTML = renderDashboard();
  }
  // Only cache rendered page if we have real data (not "connecting" placeholders)
  if (S.connected) S._renderedPage = S.page;
}

// ─── Live Data Updates (no DOM rebuild) ─────────────────────────────────────
function _set(id, text) {
  const el = document.getElementById(id);
  if (el && el.textContent !== String(text)) el.textContent = text;
}
function _setHTML(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}
function _setWidth(id, pct) {
  const el = document.getElementById(id);
  if (el) el.style.width = pct + '%';
}

function updateLiveData() {
  switch(S.page) {
    case 'dashboard': updateDashboard(); break;
    case 'mining': updateMining(); break;
    case 'mempool': updateMempool(); break;
    case 'node': updateNode(); break;
    case 'lottery': updateLottery(); break;
    case 'history': updateHistory(); break;
    case 'marketplace': updateMarketplace(); break;
    case 'governance': updateGovernance(); break;
    case 'exchange': updateExchange(); break;
    // wallet, send, help, agents, explorer, faucet, trade are static forms — no update needed
  }
}

function updateDashboard() {
  const s = S.status;
  const m = S.mining;
  const acct = S.myAccount;
  if (!s) return;

  const rewardBaud = m ? fmt(m.current_block_reward_baud) : '—';
  const pctMined = m ? parseFloat(m.percent_mined) : 0;
  const myBalanceBaud = acct ? fmtBaud(acct.balance) : '—';
  const myBalanceNum = acct ? Number(BigInt(acct.balance) / QUANTA_PER_BAUD) : 0;
  const myPctOfSupply = myBalanceNum > 0 ? ((myBalanceNum / TOTAL_SUPPLY) * 100) : 0;
  const myPctStr = myPctOfSupply >= 0.01 ? myPctOfSupply.toFixed(2) : myPctOfSupply.toFixed(4);

  _set('d-balance', myBalanceBaud);
  _set('d-reward', rewardBaud);
  _set('d-reward-unit', 'BAUD/block');
  _set('d-reward-min', `≈ ${m ? fmt(m.current_block_reward_baud * 60) : '—'} BAUD/minute`);
  _setHTML('d-ownership', myPctOfSupply > 0 ? `You own <strong style="color:var(--primary-light)">${myPctStr}%</strong> of the total 1 billion BAUD supply` : 'Mining in progress…');
  _setWidth('d-balance-bar', Math.min(myPctOfSupply, 100));
  _set('d-balance-pct-label', `${myPctStr}% of 1,000,000,000 BAUD`);

  _set('d-blocks', fmt(s.height));
  _set('d-uptime', fmtUptime(s.uptime_ms));
  _set('d-net-mined', m ? fmt(m.total_mined_baud) : '—');
  _set('d-pct-mined', pctMined.toFixed(4) + '% of total supply');
  _set('d-accounts', fmt(s.accounts));
  _set('d-escrows', fmt(s.escrows) + ' active escrows');
  _set('d-mempool', fmt(s.mempool_size));

  if (m) {
    _set('d-era', `Era ${m.current_era} of 21`);
    _set('d-halving', `${fmt(m.blocks_until_halving)} blocks until reward halves`);
    _setWidth('d-era-bar', (1 - m.blocks_until_halving/m.halving_interval)*100);
    _set('d-era-interval', fmt(m.halving_interval));
    _set('d-next-halving', '#' + fmt(m.next_halving_block));
    _set('d-max-supply', fmt(m.total_supply_baud) + ' BAUD');
    _set('d-mined-sofar', fmt(m.total_mined_baud) + ' BAUD');
  }
}

function updateMining() {
  const m = S.mining;
  if (!m) return;
  const pct = parseFloat(m.percent_mined);
  const eraProgress = ((1 - m.blocks_until_halving/m.halving_interval)*100).toFixed(2);

  _set('m-era', m.current_era);
  _set('m-reward', fmt(m.current_block_reward_baud));
  _set('m-halving', fmt(m.blocks_until_halving));
  _set('m-halving-sub', 'Next: Block #' + fmt(m.next_halving_block));
  _set('m-supply-pct', pct.toFixed(4) + '%');
  _set('m-supply-sub', fmt(m.total_mined_baud) + ' / ' + fmt(m.total_supply_baud) + ' BAUD');
  _set('m-era-label', 'Era ' + m.current_era);
  _set('m-era-pct', eraProgress + '%');
  _setWidth('m-era-bar', eraProgress);
  _set('m-total-label', fmt(m.total_mined_baud) + ' BAUD mined');
  _set('m-total-pct', pct.toFixed(4) + '%');
  _setWidth('m-total-bar', Math.min(pct, 100));
}

function updateNode() {
  const s = S.status;
  const h = S.health;
  if (!s) return;
  _setHTML('n-status', h ? h.status : 'unknown');
  _set('n-height', fmt(s.height));
  _set('n-uptime', fmtUptime(s.uptime_ms));
  _set('n-accounts', fmt(s.accounts));
  _set('n-escrows', fmt(s.escrows));
  _set('n-mempool', fmt(s.mempool_size));
}

function updateMempool() {
  const mp = S.mempool;
  if (!mp) return;
  _set('mp-pending', fmt(mp.pending_count));
  const newSig = mp.transactions.map(t => t.hash).join(',');
  if (S._mpSig !== newSig) {
    S._mpSig = newSig;
    const el = document.getElementById('mp-body');
    if (el) el.innerHTML = mempoolBody(mp);
  }
}

function mempoolBody(mp) {
  if (mp.transactions.length > 0) {
    return `<div class="table-wrap"><table>
      <tr><th>Hash</th><th>Sender</th><th>Nonce</th><th>Timestamp</th></tr>
      ${mp.transactions.map(tx => `
        <tr>
          <td class="mono copyable" onclick="copyText('${tx.hash}')">${shortAddr(tx.hash)}</td>
          <td class="mono copyable" onclick="copyText('${tx.sender}')">${shortAddr(tx.sender)}</td>
          <td>${tx.nonce}</td>
          <td>${new Date(tx.timestamp).toLocaleTimeString()}</td>
        </tr>
      `).join('')}
    </table></div>`;
  }
  return `<div class="card" style="text-align:center;padding:48px;color:var(--text3)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" style="margin:0 auto 12px;opacity:.4"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>
    <p>Mempool is empty — all transactions have been included in blocks</p>
  </div>`;
}

// ── Dashboard ──
function renderDashboard() {
  const s = S.status;
  const m = S.mining;
  const acct = S.myAccount;
  if (!s) return `<div class="page"><div class="page-header"><h1>Dashboard</h1><p>Connecting to your node…</p></div></div>`;

  const rewardBaud = m ? fmt(m.current_block_reward_baud) : '—';
  const pctMined = m ? parseFloat(m.percent_mined) : 0;

  // Calculate balance info
  const myBalanceBaud = acct ? fmtBaud(acct.balance) : '—';
  const myBalanceNum = acct ? Number(BigInt(acct.balance) / QUANTA_PER_BAUD) : 0;
  const myPctOfSupply = myBalanceNum > 0 ? ((myBalanceNum / TOTAL_SUPPLY) * 100) : 0;
  const myPctStr = myPctOfSupply >= 0.01 ? myPctOfSupply.toFixed(2) : myPctOfSupply.toFixed(4);

  return `<div class="page">
    <div class="page-header"><h1>Dashboard</h1><p>Welcome to your Baud node — here's what's happening right now</p></div>

    <!-- Your Balance — Hero Card -->
    <div class="card" style="margin-bottom:24px;background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(6,182,212,.08));border-color:rgba(139,92,246,.3)">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
        <div>
          <div style="font-size:.8em;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px">Your Balance</div>
          <div style="font-family:'Space Grotesk','DM Sans',sans-serif;font-size:clamp(1.3em,4vw,2.1em);font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;font-feature-settings:'tnum'"><span id="d-balance">${myBalanceBaud}</span> <span style="font-size:.45em;color:var(--text2)">BAUD</span></div>
          <div id="d-ownership" style="font-size:.85em;color:var(--text2);margin-top:2px">
            ${myPctOfSupply > 0 ? `You own <strong style="color:var(--primary-light)">${myPctStr}%</strong> of the total 1 billion BAUD supply` : 'Mining in progress…'}
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:.8em;color:var(--text3);margin-bottom:4px">Earning</div>
          <div style="font-family:'Space Grotesk','DM Sans',sans-serif;font-size:clamp(1em,3vw,1.4em);font-weight:600;color:var(--gold);font-feature-settings:'tnum'"><span id="d-reward">${rewardBaud}</span> <span id="d-reward-unit" style="font-size:.6em;color:var(--text2)">BAUD/block</span></div>
          <div id="d-reward-min" style="font-size:.8em;color:var(--text3);margin-top:2px">≈ ${m ? fmt(m.current_block_reward_baud * 60) : '—'} BAUD/minute</div>
        </div>
      </div>
      ${myPctOfSupply > 0 ? `
      <div class="progress-bar" style="margin-top:16px;height:10px">
        <div class="fill" id="d-balance-bar" style="width:${Math.min(myPctOfSupply, 100)}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.75em;color:var(--text3);margin-top:4px">
        <span>0%</span><span id="d-balance-pct-label">${myPctStr}% of 1,000,000,000 BAUD</span><span>100%</span>
      </div>` : ''}
    </div>

    <div class="cards-grid">
      <div class="card stat-card">
        <div class="stat-label">Blocks Produced</div>
        <div class="stat-value" style="color:var(--primary)" id="d-blocks">${fmt(s.height)}</div>
        <div class="stat-sub" id="d-uptime">${fmtUptime(s.uptime_ms)}</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Network Mined</div>
        <div class="stat-value" style="color:var(--green)" id="d-net-mined">${m ? fmt(m.total_mined_baud) : '—'}</div>
        <div class="stat-sub" id="d-pct-mined">${pctMined.toFixed(4)}% of total supply</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Accounts</div>
        <div class="stat-value" style="color:var(--cyan)" id="d-accounts">${fmt(s.accounts)}</div>
        <div class="stat-sub" id="d-escrows">${fmt(s.escrows)} active escrows</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Mempool</div>
        <div class="stat-value" style="color:var(--orange)" id="d-mempool">${fmt(s.mempool_size)}</div>
        <div class="stat-sub">pending transactions</div>
      </div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="section-title"><span class="status-dot green mining-active"></span> Mining Progress</div>
        <div style="display:flex;justify-content:space-between;font-size:.9em;margin-bottom:4px">
          <span id="d-era">Era ${m ? m.current_era : 0} of 21</span>
          <span id="d-halving">${m ? fmt(m.blocks_until_halving) : '—'} blocks until reward halves</span>
        </div>
        <div class="progress-bar"><div class="fill" id="d-era-bar" style="width:${m ? ((1 - m.blocks_until_halving/m.halving_interval)*100) : 0}%"></div></div>
        <div class="inline-grid" style="margin-top:16px;font-size:.85em">
          <div><span style="color:var(--text3)">Blocks Per Era</span><br><strong id="d-era-interval">${m ? fmt(m.halving_interval) : '—'}</strong></div>
          <div><span style="color:var(--text3)">Next Halving</span><br>Block <strong id="d-next-halving">#${m ? fmt(m.next_halving_block) : '—'}</strong></div>
          <div><span style="color:var(--text3)">Max Supply</span><br><strong id="d-max-supply">${m ? fmt(m.total_supply_baud) : '—'} BAUD</strong></div>
          <div><span style="color:var(--text3)">Mined So Far</span><br><strong id="d-mined-sofar">${m ? fmt(m.total_mined_baud) : '—'} BAUD</strong></div>
        </div>
      </div>
      <div class="card">
        <div class="section-title">Quick Actions</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <a href="#send" onclick="navigate('send')" class="btn btn-primary" style="text-decoration:none;justify-content:center">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            Send BAUD
          </a>
          <a href="#accounts" onclick="navigate('accounts')" class="btn btn-secondary" style="text-decoration:none;justify-content:center">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            Look Up Account
          </a>
          <a href="#wallet" onclick="navigate('wallet')" class="btn btn-secondary" style="text-decoration:none;justify-content:center">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M16 14h.01M2 10h20"/></svg>
            Generate New Keypair
          </a>
        </div>
        <div style="margin-top:16px;padding:12px;background:var(--bg);border-radius:var(--radius-sm);font-size:.8em;color:var(--text3)">
          <strong style="color:var(--text2)">Your Address</strong><br>

async function submitTransfer() {
  const secret = $('#tx-secret').value.trim();
  const to = $('#tx-to').value.trim();
  const amountStr = $('#tx-amount').value.trim();
  const nonce = $('#tx-nonce').value.trim();
  const memo = $('#tx-memo').value.trim();
  const el = $('#tx-result');

  if (!secret || !to || !amountStr || nonce === '') {
    el.innerHTML = '<div class="alert alert-error">Please fill in all required fields</div>';
    return;
  }

  // Convert BAUD to quanta (1 BAUD = 10^18 quanta)
  const amountFloat = parseFloat(amountStr);
  if (isNaN(amountFloat) || amountFloat <= 0) {
    el.innerHTML = '<div class="alert alert-error">Please enter a valid amount</div>';
    return;
  }
  // Use BigInt for precision: split into whole and fractional BAUD
  const wholeBaud = BigInt(Math.floor(amountFloat));
  const fracPart = amountFloat - Math.floor(amountFloat);
  const fracQuanta = BigInt(Math.round(fracPart * 1e18));
  const amountQuanta = (wholeBaud * QUANTA_PER_BAUD + fracQuanta).toString();

  el.innerHTML = '<div class="alert alert-info">Signing and submitting…</div>';

  try {
    const resp = await fetch(API + '/v1/sign-and-submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        type: 'Transfer',
        secret, to,
        amount: amountQuanta,
        nonce: parseInt(nonce),
        memo: memo || null,
        chain_id: S.status ? S.status.chain_id : 'baud-mainnet',
      })
    });
    const data = await resp.json();
    if (resp.ok) {
      el.innerHTML = `<div class="alert alert-success">Transaction submitted!<br><span class="mono">${data.tx_hash}</span></div>`;
    } else {
      el.innerHTML = `<div class="alert alert-error">${escapeHtml(data.error || 'Submission failed')}</div>`;
    }
  } catch(e) {
    el.innerHTML = `<div class="alert alert-error">${escapeHtml(e.message)}</div>`;
  }
}

  const secret = $('#esc-secret').value.trim();
  const recipient = $('#esc-recipient').value.trim();
  const amount = $('#esc-amount').value.trim();
  const preimage = $('#esc-preimage').value.trim();
  const deadline = $('#esc-deadline').value.trim();

  if (!secret || !recipient || !amount || !preimage || !deadline || nonce === '') {
    el.innerHTML = '<div class="alert alert-error">Please fill in all required fields</div>';
    return;
  }

  el.innerHTML = '<div class="alert alert-info">Signing and submitting…</div>';

  try {
    const resp = await fetch(API + '/v1/sign-and-submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        type: 'EscrowCreate',
        secret, recipient,
        amount: parseInt(amount),
        preimage, deadline: parseInt(deadline),
        nonce: parseInt(nonce),
        chain_id: S.status ? S.status.chain_id : 'baud-mainnet',
      })
    });
    const data = await resp.json();
    if (resp.ok) {
      el.innerHTML = `<div class="alert alert-success">Escrow created!<br><span class="mono">${data.tx_hash}</span></div>`;
    } else {
      el.innerHTML = `<div class="alert alert-error">${escapeHtml(data.error || 'Submission failed')}</div>`;

  } catch(e) {

}

function switchEscrowActionTab(el, tab) {
  el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  $('#escrow-release-tab').style.display = tab === 'release' ? '' : 'none';
  $('#escrow-refund-tab').style.display = tab === 'refund' ? '' : 'none';
}

async function lookupTx() {
  const hash = $('#tx-lookup-hash').value.trim();
  const el = $('#tx-lookup-result');
  if (!hash) { el.innerHTML = '<div class="alert alert-error">Enter a transaction hash</div>'; return; }
  el.innerHTML = '<div class="alert alert-info">Looking up…</div>';
  try {
    const resp = await fetch(API + '/v1/tx/' + hash);
    if (!resp.ok) { const d = await resp.json(); el.innerHTML = `<div class="alert alert-error">${escapeHtml(d.error||'Not found')}</div>`; return; }
    const data = await resp.json();
    el.innerHTML = `<div class="card" style="background:var(--bg1)">
      <div class="table-wrap"><table><tbody>
        <tr><td style="color:var(--text3);width:120px">Hash</td><td class="mono" style="word-break:break-all">${escapeHtml(data.hash || hash)}</td></tr>
        <tr><td style="color:var(--text3)">Sender</td><td class="mono" style="word-break:break-all">${escapeHtml(data.sender)}</td></tr>
        <tr><td style="color:var(--text3)">Nonce</td><td>${data.nonce}</td></tr>
        <tr><td style="color:var(--text3)">Type</td><td><span class="badge badge-primary">${escapeHtml(data.tx_type || data.payload_type || 'Unknown')}</span></td></tr>
        <tr><td style="color:var(--text3)">Timestamp</td><td>${new Date(data.timestamp).toLocaleString()}</td></tr>
      </tbody></table></div>
    </div>`;
  } catch(e) { el.innerHTML = `<div class="alert alert-error">${escapeHtml(e.message)}</div>`; }
}

async function submitAgentRegister() {
  const secret = $('#agent-secret').value.trim();
  const name = $('#agent-name').value.trim();
  const endpoint = $('#agent-endpoint').value.trim();
  const capStr = $('#agent-capabilities').value.trim();
  const nonce = $('#agent-nonce').value.trim();
  const el = $('#agent-result');

  if (!secret || !name || nonce === '') { el.innerHTML = '<div class="alert alert-error">Secret key, name, and nonce are required</div>'; return; }
  const capabilities = capStr ? capStr.split(',').map(c => c.trim()).filter(c => c) : [];

  el.innerHTML = '<div class="alert alert-info">Signing and submitting…</div>';
  try {
    const resp = await fetch(API + '/v1/sign-and-submit', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ type: 'AgentRegister', secret, name, endpoint: endpoint || '', capabilities, nonce: parseInt(nonce), chain_id: S.status ? S.status.chain_id : 'baud-mainnet' })
    });
    const data = await resp.json();
    el.innerHTML = resp.ok ? `<div class="alert alert-success">Agent registered!<br><span class="mono">${data.tx_hash}</span></div>` : `<div class="alert alert-error">${escapeHtml(data.error)}</div>`;
  } catch(e) { el.innerHTML = `<div class="alert alert-error">${escapeHtml(e.message)}</div>`; }
}

async function requestFaucet() {
  const address = document.getElementById('faucet-address').value.trim();
  const el = document.getElementById('faucet-result');
  if (!address) { el.innerHTML = '<div class="alert alert-error">Please enter your BAUD address</div>'; return; }
  if (!/^[0-9a-fA-F]{64}$/.test(address)) { el.innerHTML = '<div class="alert alert-error">Invalid address. Must be a 64-character hex string.</div>'; return; }

  el.innerHTML = '<div class="alert alert-info">Requesting BAUD…</div>';
  try {
    const resp = await fetch(API + '/v1/faucet', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ address })
    });
    const data = await resp.json();
    if (resp.ok) {
      el.innerHTML = `<div class="alert alert-success">Sent 10 BAUD to your address!<br><span class="mono" style="font-size:.85em">${escapeHtml(data.tx_hash || data.message || 'Success')}</span></div>`;
    } else {
      el.innerHTML = `<div class="alert alert-error">${escapeHtml(data.error || 'Request failed')}</div>`;
    }
  } catch(e) {
    el.innerHTML = `<div class="alert alert-error">Network error: ${escapeHtml(e.message)}</div>`;
  }
}

function renderHistoryTable(limit) {
  const txs = S.history || [];
  if (!txs.length) return '<p style="color:var(--text2)">No recent transactions yet.</p>';
  const rows = txs.slice(0, limit || 20).map(tx => {
    const sender = tx.sender || '';
    const recipient = tx.recipient || '';
    return `
    <tr style="border-bottom:1px solid var(--border)">
      <td style="padding:8px 6px;font-size:.85em;color:var(--text2)">${tx.block_height ? '#'+fmt(tx.block_height) : '—'}</td>
      <td style="padding:8px 6px"><span class="badge" style="background:var(--primary);color:#fff;font-size:.75em;padding:2px 8px;border-radius:4px">${escapeHtml(tx.tx_type || 'Transfer')}</span></td>
      <td class="mono" style="padding:8px 6px;font-size:.8em;cursor:pointer" onclick="copyText('${sender}')" title="${sender}">${shortAddr(sender)}</td>
      <td style="padding:8px 6px;text-align:center;color:var(--text2)">→</td>
      <td class="mono" style="padding:8px 6px;font-size:.8em;cursor:pointer" onclick="copyText('${recipient}')" title="${recipient}">${shortAddr(recipient)}</td>
      <td style="padding:8px 6px;text-align:right;font-weight:600">${tx.amount ? fmtBaud(tx.amount) : '—'}</td>
      <td class="mono" style="padding:8px 6px;font-size:.75em;color:var(--text2);cursor:pointer" onclick="copyText('${tx.hash || ''}')" title="${tx.hash || ''}">${tx.hash ? shortAddr(tx.hash) : '—'}</td>
    </tr>`;
  }).join('');
  return `<table style="width:100%;border-collapse:collapse">
    <thead><tr style="border-bottom:2px solid var(--border);text-align:left">
      <th style="padding:8px 6px;font-size:.8em;color:var(--text2)">Block</th>
      <th style="padding:8px 6px;font-size:.8em;color:var(--text2)">Type</th>

      <th style="padding:8px 6px;font-size:.8em;color:var(--text2)">Tx Hash</th>
    </tr></thead>
    <tbody>${rows}</tbody>

}

async function registerAgent() {
  const el = document.getElementById('mp-result');
  el.innerHTML = '<div class="alert alert-info">Registering agent...</div>';
  try {
    const capStr = document.getElementById('mp-caps').value;
    const caps = capStr.split(',').map(s => s.trim()).filter(Boolean);
    const data = await (await fetch(API + '/v1/sign-and-submit', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        secret: document.getElementById('mp-secret').value,
        payload: { AgentRegister: {
          name: document.getElementById('mp-name').value,
          endpoint: document.getElementById('mp-endpoint').value,
          capabilities: caps

        nonce: parseInt(document.getElementById('mp-nonce').value) || 0

    if (data.tx_hash) {
      el.innerHTML = `<div class="alert alert-success">Agent registered! TX: <span class="mono copyable" onclick="copyText('${data.tx_hash}')">${data.tx_hash.slice(0,16)}…</span></div>`;

function renderProposalCard(p) {
  const totalVotes = (p.votes_for || 0) + (p.votes_against || 0);
  const forPct = totalVotes > 0 ? Math.round((p.votes_for || 0) / totalVotes * 100) : 0;
  const status = p.status || 'active';
  const badgeClass = status === 'passed' ? 'badge-green' : status === 'rejected' ? 'badge-red' : status === 'active' ? 'badge-cyan' : 'badge-gold';
  return `<div class="proposal-card">
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
      <strong>${escapeHtml(p.title || 'Untitled')}</strong>
      <span class="badge ${badgeClass}">${status.toUpperCase()}</span>
    </div>
    <p style="color:var(--text2);font-size:.88em;margin-bottom:8px">${escapeHtml((p.description || '').slice(0, 120))}${(p.description || '').length > 120 ? '…' : ''}</p>
    <div style="display:flex;gap:16px;font-size:.82em;color:var(--text3)">
      <span>ID: <span class="mono">${escapeHtml(String(p.id || ''))}</span></span>
      <span>Deadline: Block #${fmt(p.voting_deadline)}</span>
    </div>
    <div class="votes-bar">
      <div class="votes-for" style="width:${forPct}%"></div>
      <div class="votes-against" style="width:${100 - forPct}%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:.78em">
      <span style="color:var(--green)">For: ${p.votes_for || 0} (${forPct}%)</span>
      <span style="color:var(--red)">Against: ${p.votes_against || 0} (${100 - forPct}%)</span>
    </div>
  </div>`;
}

async function createProposal() {
  const el = document.getElementById('gov-result');
  el.innerHTML = '<div class="alert alert-info">Submitting proposal...</div>';
  try {
    const data = await (await fetch(API + '/v1/sign-and-submit', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        secret: document.getElementById('gov-secret').value,
        payload: { CreateProposal: {
          title: document.getElementById('gov-title').value,
          description: document.getElementById('gov-desc').value,
          voting_deadline: parseInt(document.getElementById('gov-deadline').value) || 0
        }},
        nonce: parseInt(document.getElementById('gov-nonce').value) || 0
      })
    })).json();
    if (data.tx_hash) {
      el.innerHTML = `<div class="alert alert-success">Proposal created! TX: <span class="mono copyable" onclick="copyText('${data.tx_hash}')">${data.tx_hash.slice(0,16)}…</span></div>`;
      refreshData();
    } else {
      el.innerHTML = `<div class="alert alert-error">${escapeHtml(data.error || 'Failed')}</div>`;
    }
  } catch(e) {
    el.innerHTML = `<div class="alert alert-error">Network error: ${escapeHtml(e.message)}</div>`;
  }
}

async function castVote(inFavor) {
  const el = document.getElementById('vote-result');
  el.innerHTML = '<div class="alert alert-info">Casting vote...</div>';
  try {
    const data = await (await fetch(API + '/v1/sign-and-submit', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        secret: document.getElementById('vote-secret').value,
        payload: { CastVote: {
          proposal_id: document.getElementById('vote-id').value,
          in_favor: inFavor
        }},
        nonce: parseInt(document.getElementById('vote-nonce').value) || 0
      })
    })).json();
    if (data.tx_hash) {
      el.innerHTML = `<div class="alert alert-success">Vote cast ${inFavor ? 'FOR' : 'AGAINST'}! TX: <span class="mono copyable" onclick="copyText('${data.tx_hash}')">${data.tx_hash.slice(0,16)}…</span></div>`;
      refreshData();
    } else {
      el.innerHTML = `<div class="alert alert-error">${escapeHtml(data.error || 'Vote failed')}</div>`;
    }
  } catch(e) {
    el.innerHTML = `<div class="alert alert-error">Network error: ${escapeHtml(e.message)}</div>`;
  }
}

let orderSide = 'buy';
function setOrderSide(side) {
  orderSide = side;
  const buyBtn = document.getElementById('ex-buy-btn');

  if (buyBtn && sellBtn) {
    if (side === 'buy') {
      buyBtn.className = 'btn btn-primary'; sellBtn.className = 'btn btn-secondary';
    } else {
      buyBtn.className = 'btn btn-secondary'; sellBtn.className = 'btn btn-primary';
    }
  }
}

async function placeOrder() {
  const el = document.getElementById('ex-result');
  el.innerHTML = '<div class="alert alert-info">Placing order...</div>';
  try {
    const priceFloat = parseFloat(document.getElementById('ex-price').value) || 0;
    const amountFloat = parseFloat(document.getElementById('ex-amount').value) || 0;
    const data = await (await fetch(API + '/v1/exchange/order', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        secret: document.getElementById('ex-secret').value,
        side: orderSide,
        price: priceFloat.toString(),
        amount: amountFloat.toString(),
        nonce: parseInt(document.getElementById('ex-nonce').value) || 0
      })
    })).json();
    if (data.order_id || data.tx_hash) {
      el.innerHTML = `<div class="alert alert-success">Order placed! ${data.order_id ? 'ID: ' + data.order_id : 'TX: ' + data.tx_hash}</div>`;
      refreshData();
    } else {
      el.innerHTML = `<div class="alert alert-error">${escapeHtml(data.error || 'Order failed')}</div>`;
    }
  } catch(e) {
    el.innerHTML = `<div class="alert alert-error">Network error: ${escapeHtml(e.message)}</div>`;
  }
}

        <p style="margin-top:16px"><strong style="color:var(--primary)">Q: How is Baud different from Bitcoin or Ethereum?</strong><br>
        A: <strong>Speed:</strong> Baud produces blocks every ~1 second vs Bitcoin's 10 minutes. <strong>Fees:</strong> Baud transactions are completely free — no gas fees. <strong>Purpose:</strong> While Bitcoin is "digital gold" and Ethereum is a general smart contract platform, Baud is purpose-built for AI agent economies. <strong>Escrow:</strong> Built-in hash-time-locked escrow for trustless M2M deals, not requiring complex smart contracts.</p>

        <p style="margin-top:16px"><strong style="color:var(--primary)">Q: Is Baud secure? Can someone steal my funds?</strong><br>

        <p style="margin-top:16px"><strong style="color:var(--primary)">Q: Why are there no transaction fees?</strong><br>

        <p style="margin-top:16px"><strong style="color:var(--primary)">Q: What is the total supply? Will more BAUD be printed?</strong><br>
        A: The maximum supply is exactly <strong>1,000,000,000 BAUD</strong> (1 billion). Mining starts at 500 BAUD per block and halves every 1,000,000 blocks across 21 eras — similar to Bitcoin's scarcity model. Once all 21 eras complete, no new BAUD will ever be created. The supply schedule is hardcoded and cannot be changed.</p>

        <p style="margin-top:16px"><strong style="color:var(--primary)">Q: What are escrows and when would I use them?</strong><br>
        A: Escrows are built-in "trust-free deals." You lock BAUD with a hash lock and a deadline. The recipient must reveal a secret preimage to claim the funds. If the deadline passes without the reveal, the sender gets an automatic refund. <strong>Use case:</strong> An AI agent pays another agent for a task — the payment is locked in escrow until the work is proven complete.</p>

        <p style="margin-top:16px"><strong style="color:var(--primary)">Q: Can I have multiple secret keys / wallets?</strong><br>
        A: Yes. Each secret key creates a completely separate address with its own balance. Think of it as having multiple bank accounts. Your main key (the validator key) earns mining rewards, but you can generate as many additional keys as you want from the Wallet page.</p>

        <p style="margin-top:16px"><strong style="color:var(--primary)">Q: What happens if I lose my secret key?</strong><br>
        A: <strong>All BAUD at that address is permanently lost.</strong> There is no recovery mechanism, no customer support, and no way to reset it. This is by design — it means nobody else can access your funds either. Always back up your key securely.</p>

        <p style="margin-top:16px"><strong style="color:var(--primary)">Q: How does mining work? Does it waste energy?</strong><br>
        A: Unlike Bitcoin's proof-of-work, Baud uses <strong>BFT (Byzantine Fault Tolerant) consensus</strong> with round-robin leader selection. Validators take turns proposing blocks — no energy-wasting puzzle solving. If your node is running, it's mining. The reward is 500 BAUD per block (in Era 0) and blocks are produced every ~1 second.</p>

        <p style="margin-top:16px"><strong style="color:var(--primary)">Q: Can I use Baud for real-world payments?</strong><br>
        A: Baud is primarily designed for M2M (machine-to-machine) transactions between AI agents, but it works for any peer-to-peer transfer. The zero-fee, instant-confirmation model makes it suitable for micro-payments, tipping, and any scenario where speed and cost matter more than integration with traditional finance.</p>

        <p style="margin-top:16px"><strong style="color:var(--primary)">Q: How do I stop mining / shut down my node?</strong><br>
        A: Close the node process. On Windows, use the "Stop Baud Node" shortcut in the Start Menu, or end the baud-node process in Task Manager. Mining happens automatically while the node is running.</p>

  </div>`;

  if (saved) document.documentElement.dataset.theme = saved;

  const page = location.hash.slice(1) || 'dashboard';
