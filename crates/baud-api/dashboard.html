<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baud Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='40' y2='40'%3E%3Cstop offset='0%25' stop-color='%237c3aed'/%3E%3Cstop offset='100%25' stop-color='%2306b6d4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='40' height='40' rx='10' fill='url(%23g)'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='20' font-weight='700' fill='%23fff' font-family='sans-serif'%3EB%3C/text%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b1a;--bg2:#10102a;--card:#141432;--card-hover:#1a1a3e;
  --border:#1e1e44;--text:#e8e8f4;--text2:#a0a0b8;--text3:#666680;
  --primary:#8b5cf6;--primary-light:#a78bfa;--cyan:#06b6d4;--green:#22c55e;
  --red:#ef4444;--gold:#f5a623;--orange:#f97316;
  --sidebar-w:240px;--radius:12px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --gradient:linear-gradient(135deg,#7c3aed,#06b6d4);
}
[data-theme="light"]{
  --bg:#f0f0f6;--bg2:#e8e8f0;--card:#ffffff;--card-hover:#f5f5fa;
  --border:#d8d8e4;--text:#1a1a2e;--text2:#555570;--text3:#888898;
  --shadow:0 4px 24px rgba(0,0,0,.08);
}
html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;color:var(--text);background:var(--bg)}
body{display:flex;min-height:100vh;overflow-x:hidden}
a{color:var(--primary-light);text-decoration:none}
a:hover{text-decoration:underline}
input,select,textarea,button{font-family:inherit;font-size:inherit}
code,.mono{font-family:'SF Mono',Consolas,'Courier New',monospace;font-size:.9em}

/* Sidebar */
#sidebar{
  width:var(--sidebar-w);min-height:100vh;background:var(--bg2);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  position:fixed;left:0;top:0;z-index:100;transition:transform .2s;
}
#sidebar .logo{
  padding:24px 20px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);
}
#sidebar .logo svg{width:36px;height:36px;flex-shrink:0}
#sidebar .logo span{font-size:1.3em;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#sidebar nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px}
#sidebar nav a{
  display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);
  color:var(--text2);transition:all .15s;font-weight:500;font-size:.95em;
}
#sidebar nav a:hover{background:var(--card);color:var(--text);text-decoration:none}
#sidebar nav a.active{background:var(--primary);color:#fff}
#sidebar nav a.active:hover{background:var(--primary-light)}
#sidebar nav a svg{width:18px;height:18px;flex-shrink:0;opacity:.7}
#sidebar nav a.active svg{opacity:1}
#sidebar .sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}

/* Theme toggle */
.theme-toggle{
  display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);
  background:var(--card);border:1px solid var(--border);cursor:pointer;color:var(--text2);
  font-size:.85em;transition:all .15s;
}
.theme-toggle:hover{border-color:var(--primary);color:var(--text)}
.theme-toggle svg{width:16px;height:16px}

/* Main */
#main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;padding:24px 32px 48px}
.page-header{margin-bottom:24px}
.page-header h1{font-size:1.6em;font-weight:700}
.page-header p{color:var(--text2);margin-top:4px}

/* Status dot */
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.green{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-dot.red{background:var(--red);box-shadow:0 0 8px var(--red)}
.status-dot.gold{background:var(--gold);box-shadow:0 0 8px var(--gold)}

/* Cards */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;transition:border-color .15s;
}
.card:hover{border-color:color-mix(in srgb,var(--primary) 40%,transparent)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat-card{text-align:center;padding:24px 16px}
.stat-card .stat-value{font-size:2em;font-weight:700;margin:8px 0 4px;font-variant-numeric:tabular-nums}
.stat-card .stat-label{color:var(--text2);font-size:.85em;text-transform:uppercase;letter-spacing:.05em}
.stat-card .stat-sub{color:var(--text3);font-size:.8em;margin-top:4px}

/* Progress bar */
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-bar .fill{height:100%;background:var(--gradient);border-radius:4px;transition:width .5s ease}

/* Tables */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:24px}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{text-align:left;padding:12px 16px;font-size:.8em;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg2)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.9em}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--card-hover)}

/* Forms */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85em;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);transition:border-color .15s;
}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--primary)}
.form-group input::placeholder{color:var(--text3)}
.form-group .hint{font-size:.78em;color:var(--text3);margin-top:4px}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);
  font-weight:600;border:none;cursor:pointer;transition:all .15s;font-size:.9em;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-light)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--primary)}
.btn-sm{padding:6px 14px;font-size:.82em}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.85}

/* Badge */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75em;font-weight:600}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}
.badge-gold{background:rgba(245,166,35,.15);color:var(--gold)}
.badge-cyan{background:rgba(6,182,212,.15);color:var(--cyan)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}

/* Alert */
.alert{padding:14px 18px;border-radius:var(--radius-sm);marginmargin-bottom:16px;font-size:.9em}
.alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green)}
.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.alert-info{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);color:var(--primary-light)}

/* Copy button */
.copyable{position:relative;cursor:pointer}
.copyable:hover{opacity:.85}
.copy-toast{
  position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;
  padding:10px 20px;border-radius:var(--radius-sm);font-size:.85em;font-weight:600;
  transform:translateY(80px);opacity:0;transition:all .25s;z-index:999;
}
.copy-toast.show{transform:translateY(0);opacity:1}

/* JSON viewer */
.json-view{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:16px;overflow-x:auto;white-space:pre-wrap;font-family:'SF Mono',Consolas,monospace;
  font-size:.82em;line-height:1.6;max-height:400px;overflow-y:auto;
}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px;padding-bottom:0}
.tab{
  padding:10px 18px;cursor:pointer;color:var(--text2);font-weight:500;font-size:.9em;
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Responsive */
#mobile-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;padding:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;color:var(--text)}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0;padding:16px}
  #mobile-toggle{display:block}
  .cards-grid{grid-template-columns:1fr}
}

/* Skeleton animation */
.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--card) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;height:1.2em;display:inline-block;width:80px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Fade-in for page transitions */
.page{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Two-col layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* Section */
.section-title{font-size:1.1em;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* Mining animation */
@keyframes pulse-glow{0%,100%{box-shadow:0 0 8px var(--green)}50%{box-shadow:0 0 20px var(--green)}}
.mining-active{animation:pulse-glow 2s infinite}
</style>
</head>
<body>

<button id="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
</button>

<aside id="sidebar">
  <div class="logo">
    <svg viewBox="0 0 40 40" fill="none"><defs><linearGradient id="lg" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#lg)"/><text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle" font-size="20" font-weight="700" fill="#fff" font-family="sans-serif">B</text></svg>
    <span>Baud</span>
  </div>
  <nav id="nav">
    <a href="#dashboard" data-page="dashboard" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="#mining" data-page="mining">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      Mining
    </a>
    <a href="#wallet" data-page="wallet">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M16 14h.01M2 10h20"/></svg>
      Wallet
    </a>
    <a href="#send" data-page="send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      Send
    </a>
    <a href="#accounts" data-page="accounts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      Accounts
    </a>
    <a href="#mempool" data-page="mempool">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="10"/></svg>
      Mempool
    </a>
    <a href="#node" data-page="node">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg>
      Node Info
    </a>
    <a href="#explorer" data-page="explorer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Explorer
    </a>
    <a href="#agents" data-page="agents">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Agents
    </a>
    <a href="#help" data-page="help">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Help
    </a>
  </nav>
  <div class="sidebar-footer">
    <div style="display:flex;align-items:center;gap:6px;font-size:.82em;color:var(--text3)">
      <span class="status-dot green" id="status-dot"></span>
      <span id="node-status-text">Connected</span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">
      <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <span id="theme-label">Light Mode</span>
    </button>
  </div>
</aside>

<main id="main">
  <div id="content"></div>
</main>

<div class="copy-toast" id="copy-toast">Copied!</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
const S = {
  status: null, mining: null, mempool: null, health: null, myAccount: null,
  lastUpdate: 0, connected: false, page: 'dashboard',
};
const API = location.origin;
const TOTAL_SUPPLY = 1000000000; // 1 billion BAUD
const QUANTA_PER_BAUD = 1000000000000000000n; // 10^18

// ─── Helpers ────────────────────────────────────────────────────────────────
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function fmt(n) {
  if (n === undefined || n === null) return '—';
  return Number(n).toLocaleString();
}

function fmtBaud(quanta) {
  if (!quanta) return '0';
  const b = BigInt(quanta);
  const whole = b / QUANTA_PER_BAUD;
  const frac = b % QUANTA_PER_BAUD;
  if (frac === 0n) return whole.toLocaleString();
  const fracStr = frac.toString().padStart(18,'0').replace(/0+$/,'');
  return `${whole.toLocaleString()}.${fracStr.slice(0,6)}`;
}

function fmtUptime(ms) {
  if (!ms) return '0s';
  const s = Math.floor(ms/1000), m = Math.floor(s/60), h = Math.floor(m/60), d = Math.floor(h/24);
  if (d > 0) return `${d}d ${h%24}h ${m%60}m`;
  if (h > 0) return `${h}h ${m%60}m ${s%60}s`;
  if (m > 0) return `${m}m ${s%60}s`;
  return `${s}s`;
}

function shortAddr(a) {
  if (!a || a.length < 16) return a || '';
  return a.slice(0,8) + '…' + a.slice(-8);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const t = $('#copy-toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── API Fetchers ───────────────────────────────────────────────────────────
async function fetchJSON(path) {
  try {
    const r = await fetch(API + path);
    if (!r.ok) throw new Error(r.statusText);
    return await r.json();
  } catch(e) { return null; }
}

async function refreshData() {
  const [status, mining, mempool, health] = await Promise.all([
    fetchJSON('/v1/status'),
    fetchJSON('/v1/mining'),
    fetchJSON('/v1/mempool'),
    fetchJSON('/v1/health'),
  ]);
  S.status = status;
  S.mining = mining;
  S.mempool = mempool;
  S.health = health;
  S.connected = !!status;
  S.lastUpdate = Date.now();

  // Fetch validator's own account balance
  if (status && status.node_address) {
    S.myAccount = await fetchJSON('/v1/account/' + status.node_address);
  }

  const dot = $('#status-dot');
  const txt = $('#node-status-text');
  if (S.connected) {
    dot.className = 'status-dot green';
    txt.textContent = `Block #${fmt(status.height)}`;
  } else {
    dot.className = 'status-dot red';
    txt.textContent = 'Disconnected';
  }

  renderPage();
}

// ─── Router ─────────────────────────────────────────────────────────────────
function navigate(page) {
  S.page = page;
  $$('#nav a').forEach(a => a.classList.toggle('active', a.dataset.page === page));
  renderPage();
}

window.addEventListener('hashchange', () => {
  const p = location.hash.slice(1) || 'dashboard';
  navigate(p);
});

// ─── Theme ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  localStorage.setItem('baud-theme', next);
  updateThemeUI();
}

function updateThemeUI() {
  const dark = document.documentElement.dataset.theme === 'dark';
  $('#theme-icon-dark').style.display = dark ? '' : 'none';
  $('#theme-icon-light').style.display = dark ? 'none' : '';
  $('#theme-label').textContent = dark ? 'Light Mode' : 'Dark Mode';
}

// ─── Page Renderers ─────────────────────────────────────────────────────────
function renderPage() {
  const c = $('#content');
  switch(S.page) {
    case 'dashboard': c.innerHTML = renderDashboard(); break;
    case 'mining': c.innerHTML = renderMining(); break;
    case 'wallet': c.innerHTML = renderWallet(); break;
    case 'send': c.innerHTML = renderSend(); break;
    case 'accounts': c.innerHTML = renderAccounts(); break;
    case 'mempool': c.innerHTML = renderMempool(); break;
    case 'node': c.innerHTML = renderNode(); break;
    case 'explorer': c.innerHTML = renderExplorer(); break;
    case 'agents': c.innerHTML = renderAgents(); break;
    case 'help': c.innerHTML = renderHelp(); break;
    default: c.innerHTML = renderDashboard();
  }
}

// ── Dashboard ──
function renderDashboard() {
  const s = S.status;
  const m = S.mining;
  const acct = S.myAccount;
  if (!s) return `<div class="page"><div class="page-header"><h1>Dashboard</h1><p>Connecting to your node…</p></div></div>`;

  const rewardBaud = m ? fmt(m.current_block_reward_baud) : '—';
  const pctMined = m ? parseFloat(m.percent_mined) : 0;

  // Calculate balance info
  const myBalanceBaud = acct ? fmtBaud(acct.balance) : '—';
  const myBalanceNum = acct ? Number(BigInt(acct.balance) / QUANTA_PER_BAUD) : 0;
  const myPctOfSupply = myBalanceNum > 0 ? ((myBalanceNum / TOTAL_SUPPLY) * 100) : 0;
  const myPctStr = myPctOfSupply >= 0.01 ? myPctOfSupply.toFixed(2) : myPctOfSupply.toFixed(4);

  return `<div class="page">
    <div class="page-header"><h1>Dashboard</h1><p>Welcome to your Baud node — here's what's happening right now</p></div>

    <!-- Your Balance — Hero Card -->
    <div class="card" style="margin-bottom:24px;background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(6,182,212,.08));border-color:rgba(139,92,246,.3)">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
        <div>
          <div style="font-size:.8em;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px">Your Balance</div>
          <div style="font-size:2.4em;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums">${myBalanceBaud} <span style="font-size:.45em;color:var(--text2)">BAUD</span></div>
          <div style="font-size:.85em;color:var(--text2);margin-top:2px">

// ── Mining ──
function renderMining() {
  const m = S.mining;
  const s = S.status;
  if (!m) return `<div class="page"><div class="page-header"><h1>Mining</h1><p>Waiting for data…</p></div></div>`;

  const pct = parseFloat(m.percent_mined);
  const eraProgress = ((1 - m.blocks_until_halving/m.halving_interval)*100).toFixed(2);

  return `<div class="page">
    <div class="page-header"><h1>Mining</h1><p>Block reward schedule and mining statistics</p></div>
    <div class="cards-grid">
      <div class="card stat-card">
        <div class="stat-label">Current Era</div>
        <div class="stat-value" style="color:var(--primary)">${m.current_era}</div>
        <div class="stat-sub">of 21 total eras</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Block Reward</div>
        <div class="stat-value" style="color:var(--gold)">${fmt(m.current_block_reward_baud)}</div>
        <div class="stat-sub">BAUD per block</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Blocks Until Halving</div>
        <div class="stat-value" style="color:var(--cyan)">${fmt(m.blocks_until_halving)}</div>
        <div class="stat-sub">Next: Block #${fmt(m.next_halving_block)}</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Supply Mined</div>
        <div class="stat-value" style="color:var(--green)">${pct.toFixed(4)}%</div>
        <div class="stat-sub">${fmt(m.total_mined_baud)} / ${fmt(m.total_supply_baud)} BAUD</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="section-title"><span class="status-dot green mining-active"></span> Era Progress</div>
      <div style="display:flex;justify-content:space-between;font-size:.9em;margin-bottom:4px">
        <span>Era ${m.current_era}</span><span>${eraProgress}%</span>
      </div>
      <div class="progress-bar"><div class="fill" style="width:${eraProgress}%"></div></div>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="section-title">Total Supply Progress</div>
      <div style="display:flex;justify-content:space-between;font-size:.9em;margin-bottom:4px">
        <span>${fmt(m.total_mined_baud)} BAUD mined</span><span>${pct.toFixed(4)}%</span>
      </div>
      <div class="progress-bar"><div class="fill" style="width:${Math.min(pct,100)}%"></div></div>
    </div>
    <div class="card">
      <div class="section-title">Halving Schedule</div>
      <div class="table-wrap" style="margin-bottom:0"><table>
        <tr><th>Era</th><th>Block Range</th><th>Block Reward</th><th>Era Supply</th><th>Status</th></tr>
        ${Array.from({length:8}, (_,i) => {
          const reward = m.initial_block_reward_baud / Math.pow(2,i);
          const start = i * m.halving_interval;
          const end = (i+1) * m.halving_interval - 1;
          const eraSupply = reward * m.halving_interval;
          const status = i < m.current_era ? 'Complete' : i === m.current_era ? 'Active' : 'Future';
          const badge = status === 'Active' ? 'badge-green' : status === 'Complete' ? 'badge-cyan' : 'badge-gold';
          return `<tr>
            <td><strong>${i}</strong></td>
            <td class="mono">${fmt(start)} → ${fmt(end)}</td>
            <td><strong>${fmt(reward)}</strong> BAUD</td>
            <td>${fmt(eraSupply)} BAUD</td>
            <td><span class="badge ${badge}">${status}</span></td>
          </tr>`;
        }).join('')}
      </table></div>
    </div>
  </div>`;
}

// ─── Actions ────────────────────────────────────────────────────────────────

async function generateKeypair() {
  const el = $('#keygen-result');
  el.innerHTML = '<div class="alert alert-info">Generating…</div>';
  const data = await fetchJSON('/v1/keygen');
  if (!data) { el.innerHTML = '<div class="alert alert-error">Failed to generate keypair</div>'; return; }
  el.innerHTML = `
    <div class="alert alert-success" style="margin-bottom:12px">Keypair generated!</div>
    <div style="font-size:.85em;margin-bottom:8px"><strong>Address</strong> (public — safe to share)</div>
    <div class="json-view copyable" onclick="copyText('${data.address}')" style="margin-bottom:12px;word-break:break-all">${data.address}</div>
    <div style="font-size:.85em;margin-bottom:8px"><strong>Secret Key</strong> (private — NEVER share!)</div>
    <div class="json-view copyable" onclick="copyText('${data.secret_key}')" style="word-break:break-all;color:var(--red)">${data.secret_key}</div>
    <div class="hint" style="margin-top:8px;color:var(--gold)">⚠ Save your secret key now! It won't be shown again.</div>
  `;
}

async function deriveAddress() {
  const secret = $('#derive-secret').value.trim();
  if (!secret) return;
  const el = $('#derive-result');
  el.innerHTML = '<div class="alert alert-info">Deriving…</div>';
  const resp = await fetch(API + '/v1/keygen?derive=' + encodeURIComponent(secret));
  if (!resp.ok) { el.innerHTML = '<div class="alert alert-error">Invalid secret key</div>'; return; }
  const data = await resp.json();
  el.innerHTML = `
    <div style="font-size:.85em;margin-bottom:8px"><strong>Address</strong></div>
    <div class="json-view copyable" onclick="copyText('${data.address}')" style="word-break:break-all">${data.address}</div>
  `;
}

async function lookupAccount() {
  const addr = $('#lookup-address').value.trim();
  if (!addr) return;
  const el = $('#account-result');
  el.innerHTML = '<div class="alert alert-info">Looking up…</div>';
  const data = await fetchJSON('/v1/account/' + encodeURIComponent(addr));
  if (!data) { el.innerHTML = '<div class="alert alert-error">Account not found or invalid address</div>'; return; }
  el.innerHTML = `
    <div class="card">
      <div class="section-title">Account Details</div>
      <table><tbody>

async function submitTransfer() {
  const secret = $('#tx-secret').value.trim();
  const to = $('#tx-to').value.trim();
  const amountStr = $('#tx-amount').value.trim();
  const nonce = $('#tx-nonce').value.trim();
  const memo = $('#tx-memo').value.trim();
  const el = $('#tx-result');

  if (!secret || !to || !amountStr || nonce === '') {
    el.innerHTML = '<div class="alert alert-error">Please fill in all required fields</div>';
    return;
  }

  // Convert BAUD to quanta (1 BAUD = 10^18 quanta)
  const amountFloat = parseFloat(amountStr);
  if (isNaN(amountFloat) || amountFloat <= 0) {
    el.innerHTML = '<div class="alert alert-error">Please enter a valid amount</div>';
    return;
  }
  // Use BigInt for precision: split into whole and fractional BAUD
  const wholeBaud = BigInt(Math.floor(amountFloat));
  const fracPart = amountFloat - Math.floor(amountFloat);
  const fracQuanta = BigInt(Math.round(fracPart * 1e18));
  const amountQuanta = (wholeBaud * QUANTA_PER_BAUD + fracQuanta).toString();

  el.innerHTML = '<div class="alert alert-info">Signing and submitting…</div>';

  try {
    const resp = await fetch(API + '/v1/sign-and-submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        type: 'Transfer',
        secret, to,
        amount: amountQuanta,
        nonce: parseInt(nonce),
        memo: memo || null,
        chain_id: S.status ? S.status.chain_id : 'baud-mainnet',
      })
    });
    const data = await resp.json();
    if (resp.ok) {
      el.innerHTML = `<div class="alert alert-success">Transaction submitted!<br><span class="mono">${data.tx_hash}</span></div>`;
    } else {
      el.innerHTML = `<div class="alert alert-error">${escapeHtml(data.error || 'Submission failed')}</div>`;
    }
  } catch(e) {
    el.innerHTML = `<div class="alert alert-error">${escapeHtml(e.message)}</div>`;
  }
}

// ── Help ──
function renderHelp() {
  const terms = [
    { term: 'Blockchain', simple: 'A shared digital notebook that records every transaction. Every computer on the network has a copy, so nobody can cheat.', more: 'Think of it like a Google Doc that everyone can read but nobody can secretly edit. Each "page" (block) is linked to the previous one with math, creating an unbreakable chain.' },
    { term: 'Block', simple: 'A batch of transactions grouped together. A new block is created roughly every second in Baud.', more: 'Like a page in the notebook. Each page is numbered (block height) and sealed so it can\'t be changed afterward.' },
    { term: 'Mining', simple: 'The process of creating new blocks and earning BAUD as a reward. Your node automatically mines when it\'s running.', more: 'Unlike Bitcoin, Baud mining doesn\'t waste electricity. Your computer just takes turns with other validators to create blocks. The reward is currently 500 BAUD per block and halves every 1 million blocks.' },
    { term: 'Node', simple: 'A computer running the Baud software. Your node keeps a copy of all transactions and participates in creating blocks.', more: 'When you run baud-node (or click "Baud Node" in the Start Menu), your computer becomes a node on the network.' },
    { term: 'Secret Key', simple: 'A 64-character password that controls your BAUD. Anyone who has it can spend your money. NEVER share it.', more: 'Generated using Ed25519 cryptography. Your secret key mathematically derives your address (public key). There is no "forgot password" — lose it and your funds are gone forever.' },
    { term: 'Address', simple: 'Your "account number" — a 64-character identifier where people send BAUD to you. Safe to share publicly.', more: 'Derived from your secret key using one-way math. You can\'t reverse-engineer the secret key from the address.' },
    { term: 'Nonce', simple: 'A transaction counter that prevents replay attacks. It starts at 0 and increases by 1 with each transaction you make.', more: 'If your nonce is currently 5, your next transaction must use nonce 5. The network rejects transactions with wrong nonces, preventing someone from resending your old transactions.' },
    { term: 'Transaction', simple: 'An instruction like "send 100 BAUD from me to this address." Must be signed with your secret key.', more: 'Every transaction is broadcast to the network, included in a block, and permanently recorded on the blockchain.' },
    { term: 'Escrow', simple: 'A "safe deposit box" for a deal. BAUD is locked up and only released when certain conditions are met.', more: 'Example: You pay an AI agent to do work. The BAUD is locked in escrow. If the agent delivers (proves it with a secret code), the BAUD is released to them. If the deadline passes without delivery, you get a refund. Neither party needs to trust the other.' },
    { term: 'Hash Lock / HTLC', simple: 'A math puzzle that locks an escrow. The recipient must reveal a secret word (preimage) whose hash matches the lock to claim the funds.', more: 'HTLC stands for Hash Time-Locked Contract. It combines a hash-based puzzle (the lock) with a time deadline (the refund window). Used for trustless payments between strangers.' },
    { term: 'Preimage', simple: 'The secret word/code used to unlock an escrow. Only the recipient knows it.', more: 'The sender creates a hash of the preimage and puts it in the escrow. The recipient reveals the preimage to claim the funds. This is how escrows remain trustless.' },
    { term: 'Quanta', simple: 'The smallest unit of BAUD. 1 BAUD = 10^18 quanta (like cents to dollars, but much smaller).', more: 'All internal calculations use quanta for precision. When you see huge numbers in the API (like 500000000000000000000), divide by 10^18 to get the BAUD amount.' },
    { term: 'Ed25519', simple: 'The type of encryption/signing Baud uses. It\'s fast, secure, and used by Signal, SSH, and Tor.', more: 'A digital signature algorithm using elliptic curve cryptography (Curve25519). Creates 32-byte keys that would take billions of years to crack.' },
    { term: 'AES-256-GCM', simple: 'Encryption used to protect your wallet file. Like a super-strong padlock on your key storage.', more: 'AES-256 is the encryption standard used by governments and banks. GCM mode adds authentication — it not only encrypts your data but also detects if anyone tampered with it. Used with Argon2id key derivation to turn your password into the encryption key.' },
    { term: 'Validator', simple: 'A node that participates in creating blocks. If your node is running and has a secret key, it\'s a validator.', more: 'Validators take turns proposing new blocks. Baud uses round-robin leader selection — each validator gets a turn in order.' },
    { term: 'Mempool', simple: 'A waiting room for transactions. When you submit a transaction, it goes here until the next block includes it.', more: 'Usually transactions only stay in the mempool for 1-2 seconds before being included in the next block.' },
    { term: 'State Root', simple: 'A mathematical fingerprint of the entire blockchain state (all balances, escrows, etc).', more: 'A single hash that summarizes every account balance, escrow, and piece of data on the chain. If even one number changes, the state root changes completely. Used to verify data integrity.' },
    { term: 'Consensus', simple: 'The process by which all nodes agree on the current state of the blockchain.', more: 'Baud uses BFT (Byzantine Fault Tolerant) consensus — the network works correctly even if up to ⅓ of validators are dishonest or offline.' },
    { term: 'Halving', simple: 'The mining reward cuts in half at regular intervals, making BAUD scarcer over time. Happens every 1 million blocks.', more: 'Era 0: 500 BAUD/block → Era 1: 250 → Era 2: 125 → ... After 21 halvings, no more BAUD will be created. This is similar to Bitcoin\'s supply schedule.' },
    { term: 'Agent Registration', simple: 'Registering your AI agent\'s name, URL, and skills on the blockchain so other agents can find and pay it.', more: 'Creates a permanent, public record of your agent\'s identity. Other agents can look up your address and see what services you offer.' },
    { term: 'Chain ID', simple: 'A unique name for the network (like "baud-mainnet"). Prevents transactions meant for one network from working on another.', more: 'Included in every transaction signature. A testnet transaction cannot be replayed on mainnet because the chain IDs are different.' },
    { term: 'P2P / Peer-to-Peer', simple: 'Computers talking directly to each other without a central server. How Baud nodes share blocks and transactions.', more: 'Baud uses WebSocket connections between nodes. Each node gossips new blocks and transactions to its peers.' },
    { term: 'Rate Limiting', simple: 'Protection against spam. The API allows 60 requests in a burst and 20 per second sustained.', more: 'Uses a token-bucket algorithm. Prevents anyone from overwhelming the node with excessive requests.' },
    { term: 'CI (Continuous Integration)', simple: 'Automatic testing that runs every time code is pushed to GitHub. Makes sure changes don\'t break anything.', more: 'Our CI runs `cargo test` and `cargo clippy` on every push. If tests fail, the badge turns red. It catches bugs before they reach users.' },
    { term: 'GitHub Deployments', simple: 'Automatic publishing of the Baud website to GitHub Pages every time we push changes.', more: 'The website at https://nullnaveen.github.io/Baud/ is automatically updated when code is pushed. No manual upload needed.' },
  ];

  return \`<div class="page">
    <div class="page-header"><h1>Help & Glossary</h1><p>Everything explained in plain English. Click any term to expand.</p></div>
    <div class="card" style="margin-bottom:20px">
      <div class="section-title">Quick Start Guide</div>
      <div style="line-height:1.8;font-size:.95em">
        <p><strong>1. Your node is already running</strong> — if you can see this page, your Baud node is working. It's mining BAUD every second.</p>
        <p><strong>2. Check your balance</strong> — Go to the <a href="#dashboard" onclick="navigate('dashboard')" style="color:var(--primary)">Dashboard</a> to see how much BAUD you've mined.</p>
        <p><strong>3. Send BAUD</strong> — Go to <a href="#send" onclick="navigate('send')" style="color:var(--primary)">Send</a>, enter your secret key, the recipient's address, amount, and nonce. Click Send.</p>
        <p><strong>4. Your secret key</strong> — This is your password to your funds. It's the 64-character hex string in your start-node script. <strong style="color:var(--red)">Never share it.</strong></p>
        <p><strong>5. Explore</strong> — Use <a href="#explorer" onclick="navigate('explorer')" style="color:var(--primary)">Explorer</a> to look up transactions and escrows.</p>
      </div>
    </div>
    <div class="card">
      <div class="section-title">Glossary — Technical Terms Explained</div>
      <p style="color:var(--text3);font-size:.85em;margin-bottom:16px">Click any term to see a simple explanation. Click again for more detail.</p>
      <div id="glossary-list">
        \${terms.map((t, i) => \`
          <div class="glossary-item" style="border-bottom:1px solid var(--bg3);padding:12px 0;cursor:pointer" onclick="toggleGlossary(this)">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <strong style="color:var(--primary);font-size:1.05em">\${t.term}</strong>
              <svg class="glossary-arrow" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2" width="16" height="16" style="transition:transform .2s"><path d="M6 9l6 6 6-6"/></svg>
            </div>
            <div class="glossary-simple" style="display:none;margin-top:8px;color:var(--text2);font-size:.93em;line-height:1.6">\${t.simple}</div>
            <div class="glossary-more" style="display:none;margin-top:8px;padding:10px;background:var(--bg1);border-radius:8px;color:var(--text3);font-size:.88em;line-height:1.6">\${t.more}</div>
          </div>
        \`).join('')}
      </div>
    </div>
    <div class="card" style="margin-top:20px">
      <div class="section-title">Frequently Asked Questions</div>
      <div style="line-height:1.8;font-size:.93em">
        <p><strong>Q: Can I have multiple secret keys?</strong><br>
        A: Yes, each key creates a completely separate identity with its own address and balance. Think of each key as a different bank account. Your main key (the validator key) is the one earning mining rewards.</p>
        <p style="margin-top:12px"><strong>Q: What happens if I lose my secret key?</strong><br>
        A: All BAUD at that address is lost forever. There is no recovery mechanism. Always back up your key.</p>
        <p style="margin-top:12px"><strong>Q: Are there transaction fees?</strong><br>
        A: No. Baud transactions are completely free. Rate limiting prevents spam instead of fees.</p>
        <p style="margin-top:12px"><strong>Q: How long until my BAUD is confirmed?</strong><br>
        A: About 1-2 seconds. Transactions enter the mempool and are included in the very next block.</p>
        <p style="margin-top:12px"><strong>Q: What is escrow used for?</strong><br>
        A: Escrow lets two parties make a trustless deal. BAUD is locked and only released when conditions are met (like the recipient proving they completed a task). If the deadline passes without completion, the sender gets a refund.</p>
        <p style="margin-top:12px"><strong>Q: How do I stop mining?</strong><br>
        A: Close the node. Mining happens automatically while the node is running. You can stop via the "Stop Baud Node" shortcut in the Start Menu, or end the baud-node process in Task Manager.</p>
      </div>
    </div>
  </div>\`;
}

function toggleGlossary(el) {
  const simple = el.querySelector('.glossary-simple');
  const more = el.querySelector('.glossary-more');
  const arrow = el.querySelector('.glossary-arrow');
  if (simple.style.display === 'none') {
    simple.style.display = 'block';
    arrow.style.transform = 'rotate(180deg)';
  } else if (more.style.display === 'none') {
    more.style.display = 'block';
  } else {
    simple.style.display = 'none';
    more.style.display = 'none';
    arrow.style.transform = '';
  }
}

// ─── Init ───────────────────────────────────────────────────────────────────
(function init() {
  const saved = localStorage.getItem('baud-theme');
  if (saved) document.documentElement.dataset.theme = saved;
  updateThemeUI();

  const page = location.hash.slice(1) || 'dashboard';
  navigate(page);
  refreshData();
  setInterval(refreshData, 2000);
})();
</script>
</body>
</html>
