<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baud Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512' fill='none'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='512' y2='512' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0%25' stop-color='%237c3aed'/%3E%3Cstop offset='100%25' stop-color='%2306b6d4'/%3E%3C/linearGradient%3E%3ClinearGradient id='b' x1='160' y1='100' x2='360' y2='420' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0%25' stop-color='%23fff'/%3E%3Cstop offset='100%25' stop-color='%23e8deff'/%3E%3C/linearGradient%3E%3ClinearGradient id='s' x1='340' y1='120' x2='400' y2='180' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0%25' stop-color='%2322c55e'/%3E%3Cstop offset='100%25' stop-color='%2316a34a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='96' fill='url(%23g)'/%3E%3Crect x='148' y='108' width='36' height='296' rx='18' fill='url(%23b)'/%3E%3Crect x='130' y='108' width='72' height='32' rx='8' fill='url(%23b)'/%3E%3Crect x='130' y='240' width='72' height='32' rx='8' fill='url(%23b)'/%3E%3Crect x='130' y='372' width='72' height='32' rx='8' fill='url(%23b)'/%3E%3Cpath d='M184 116H260C310 116 348 150 348 192C348 234 310 268 260 268H184' fill='none' stroke='url(%23b)' stroke-width='32' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M184 248H272C328 248 370 286 370 332C370 378 328 412 272 412H184' fill='none' stroke='url(%23b)' stroke-width='32' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='380' cy='130' r='22' fill='url(%23s)'/%3E%3Cpath d='M394 114C414 100 430 114 414 134' fill='none' stroke='%2322c55e' stroke-width='5' stroke-linecap='round' opacity='0.7'/%3E%3Cpath d='M406 102C434 82 458 102 434 130' fill='none' stroke='%2322c55e' stroke-width='4' stroke-linecap='round' opacity='0.45'/%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root,[data-theme="dark"]{
  --bg:#020617;--bg1:#0f172a;--bg2:#1e293b;--card:#0f172a;
  --border:#1e293b;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --primary:#00d4aa;--primary-light:#34d399;--cyan:#6366f1;
  --green:#22c55e;--red:#ef4444;--gold:#f59e0b;--orange:#fb923c;
  --radius:12px;--radius-sm:8px;--sidebar-w:260px;
  --glass-bg:rgba(15,23,42,.6);--glass-border:rgba(0,212,170,.1);
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --gradient:linear-gradient(135deg,#00d4aa,#6366f1);
}
[data-theme="light"]{
  --bg:#f8fafc;--bg1:#f1f5f9;--bg2:#e2e8f0;--card:#ffffff;
  --border:#cbd5e1;--text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --primary:#059669;--primary-light:#10b981;--cyan:#4f46e5;
  --green:#16a34a;--red:#dc2626;--gold:#d97706;--orange:#ea580c;
  --glass-bg:rgba(255,255,255,.7);--glass-border:rgba(5,150,105,.15);
  --shadow:0 4px 24px rgba(0,0,0,.08);
  --gradient:linear-gradient(135deg,#059669,#4f46e5);
}

body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow-x:hidden}
h1,h2,h3,.stat-value{font-family:'Space Grotesk','Inter',sans-serif}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-size:20px;vertical-align:middle}
.mono{font-family:'JetBrains Mono',monospace;font-size:.9em}

/* ─── Sidebar ─── */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.logo{padding:20px 20px 16px;display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:1.3em;letter-spacing:-.03em;color:var(--primary)}
.logo svg{width:36px;height:36px}

#nav{flex:1;overflow-y:auto;padding:4px 12px}
#nav a{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius-sm);color:var(--text3);font-size:.88em;font-weight:500;text-decoration:none;transition:all .15s;margin-bottom:2px;font-family:'Space Grotesk',sans-serif;letter-spacing:-.01em}
#nav a:hover{background:var(--bg1);color:var(--text2)}
#nav a.active{background:rgba(0,212,170,.08);color:var(--primary);border-right:2px solid var(--primary);font-weight:600}
#nav a .material-symbols-outlined{font-size:20px;opacity:.7}
#nav a.active .material-symbols-outlined{opacity:1}

.sidebar-footer{padding:16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:12px}
.theme-toggle{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);background:var(--bg1);border:1px solid var(--border);color:var(--text2);font-size:.82em;cursor:pointer;transition:all .15s;width:100%}
.theme-toggle:hover{border-color:var(--primary);color:var(--text)}
.theme-toggle svg{width:16px;height:16px;flex-shrink:0}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-dot.green{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-dot.red{background:var(--red);box-shadow:0 0 8px var(--red)}

/* ─── Main ─── */
#main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;position:relative;overflow:hidden}
#main::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,212,170,.04),transparent 70%);pointer-events:none}
#content{padding:32px;max-width:1200px;margin:0 auto;position:relative;z-index:1}

/* ─── Page layout ─── */
.page{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.page-header{margin-bottom:28px}
.page-header h1{font-size:1.8em;font-weight:800;letter-spacing:-.02em;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-header p{color:var(--text3);font-size:.9em;margin-top:4px}

/* ─── Cards ─── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;transition:border-color .2s}
.card:hover{border-color:rgba(0,212,170,.2)}
.glass-card{background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:24px;transition:border-color .2s}
.glass-card:hover{border-color:rgba(0,212,170,.3)}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat-card{text-align:center;padding:20px 16px}
.stat-label{color:var(--text3);font-size:.78em;text-transform:uppercase;letter-spacing:.1em;font-weight:600;font-family:'Space Grotesk',sans-serif}
.stat-value{font-size:1.6em;font-weight:700;margin:6px 0 4px;font-variant-numeric:tabular-nums}
.stat-sub{color:var(--text3);font-size:.8em}

.glass-stat{text-align:center;padding:24px 16px}
.glass-stat .stat-value{font-family:'Space Grotesk',sans-serif;font-size:1.8em;font-weight:700;margin:8px 0 4px;color:var(--primary);font-variant-numeric:tabular-nums}
.glass-stat .stat-label{color:var(--text2);font-size:.78em;text-transform:uppercase;letter-spacing:.1em;font-weight:600;font-family:'Space Grotesk',sans-serif}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* ─── Section titles ─── */
.section-title{font-size:1.05em;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-family:'Space Grotesk',sans-serif}

/* ─── Forms ─── */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.82em;color:var(--text2);margin-bottom:6px;font-weight:600;font-family:'Space Grotesk',sans-serif;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:.92em;transition:border-color .15s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(0,212,170,.1)}
.hint{font-size:.78em;color:var(--text3);margin-top:4px}

/* ─── Buttons ─── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);font-weight:600;font-size:.88em;cursor:pointer;border:none;transition:all .15s;font-family:'Space Grotesk',sans-serif;letter-spacing:.02em}
.btn-primary{background:var(--primary);color:#020617}
.btn-primary:hover{background:var(--primary-light);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,212,170,.3)}
.btn-secondary{background:var(--bg1);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:6px 14px;font-size:.82em}

/* ─── Badges ─── */
.badge{padding:2px 10px;border-radius:20px;font-size:.75em;font-weight:600;font-family:'Space Grotesk',sans-serif}
.badge-primary{background:rgba(0,212,170,.12);color:var(--primary)}
.badge-green{background:rgba(34,197,94,.12);color:var(--green)}
.badge-cyan{background:rgba(99,102,241,.12);color:var(--cyan)}
.badge-gold{background:rgba(245,158,11,.12);color:var(--gold)}
.badge-red{background:rgba(239,68,68,.12);color:var(--red)}

/* ─── Alerts ─── */
.alert{padding:14px 18px;border-radius:var(--radius-sm);font-size:.9em;line-height:1.5}
.alert-info{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:var(--cyan)}
.alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--green)}
.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red)}

/* ─── Table ─── */
.table-wrap{overflow-x:auto;margin:-4px}
.table-wrap table{width:100%;border-collapse:collapse}
.table-wrap th,.table-wrap td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:.88em}
.table-wrap th{color:var(--text3);font-weight:600;font-size:.78em;text-transform:uppercase;letter-spacing:.08em;font-family:'Space Grotesk',sans-serif}
.table-wrap tr:hover td{background:rgba(0,212,170,.02)}

/* ─── Progress ─── */
.progress-bar{background:var(--bg2);border-radius:6px;height:8px;overflow:hidden}
.progress-bar .fill{background:var(--gradient);height:100%;border-radius:6px;transition:width .6s ease}

/* ─── Tabs ─── */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg);border-radius:var(--radius-sm);padding:4px;border:1px solid var(--border)}
.tab{padding:8px 20px;border-radius:6px;cursor:pointer;font-size:.85em;font-weight:600;color:var(--text3);transition:all .15s;font-family:'Space Grotesk',sans-serif}
.tab.active{background:var(--primary);color:#020617}
.tab:not(.active):hover{color:var(--text)}

/* ─── Copy toast ─── */
.copy-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--primary);color:#020617;padding:10px 24px;border-radius:var(--radius);font-weight:600;font-size:.88em;opacity:0;transition:all .3s;pointer-events:none;z-index:9999}
.copy-toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.copyable{cursor:pointer;transition:color .15s}
.copyable:hover{color:var(--primary)!important}
.json-view{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-family:'JetBrains Mono',monospace;font-size:.85em}
.inline-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.inline-grid{grid-template-columns:1fr}}

/* ─── Service/bounty cards ─── */
.service-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:24px}
.service-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s}
.service-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.service-card .price{font-family:'Space Grotesk',sans-serif;font-size:1.3em;font-weight:700;color:var(--primary)}
.service-card .category{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72em;font-weight:600;background:rgba(0,212,170,.1);color:var(--primary)}

.bounty-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s}
.bounty-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.bounty-card .bounty-reward{font-family:'Space Grotesk',sans-serif;font-size:1.3em;font-weight:700;color:var(--gold)}
.bounty-card .bounty-tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72em;font-weight:600;background:rgba(245,158,11,.1);color:var(--gold)}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ─── Mining animation ─── */
@keyframes pulse-glow{0%,100%{box-shadow:0 0 8px var(--green)}50%{box-shadow:0 0 20px var(--green)}}
.mining-active{animation:pulse-glow 2s infinite}

/* ─── Skeleton animation ─── */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ─── Mobile ─── */
#mobile-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;cursor:pointer;color:var(--text)}
#mobile-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
@media(max-width:768px){
  #mobile-toggle{display:block}
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  #content{padding:20px;padding-top:56px}
  .cards-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .cards-grid{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
}
</style>
</head>
<body>

<button id="mobile-toggle" onclick="var s=document.getElementById('sidebar');s.classList.toggle('open');document.getElementById('mobile-backdrop').style.display=s.classList.contains('open')?'block':'none'">
  <span class="material-symbols-outlined">menu</span>
</button>
<div id="mobile-backdrop" onclick="document.getElementById('sidebar').classList.remove('open');this.style.display='none'"></div>

<aside id="sidebar">
  <div class="logo">
    <svg viewBox="0 0 512 512" fill="none" style="width:36px;height:36px"><defs><linearGradient id="lg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient><linearGradient id="lb" x1="160" y1="100" x2="360" y2="420" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#e8deff"/></linearGradient><linearGradient id="ls" x1="340" y1="120" x2="400" y2="180" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#16a34a"/></linearGradient></defs><rect width="512" height="512" rx="96" fill="url(#lg)"/><rect x="148" y="108" width="36" height="296" rx="18" fill="url(#lb)"/><rect x="130" y="108" width="72" height="32" rx="8" fill="url(#lb)"/><rect x="130" y="240" width="72" height="32" rx="8" fill="url(#lb)"/><rect x="130" y="372" width="72" height="32" rx="8" fill="url(#lb)"/><path d="M184 116 H260 C310 116 348 150 348 192 C348 234 310 268 260 268 H184" fill="none" stroke="url(#lb)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/><path d="M184 248 H272 C328 248 370 286 370 332 C370 378 328 412 272 412 H184" fill="none" stroke="url(#lb)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/><circle cx="380" cy="130" r="22" fill="url(#ls)"/><path d="M394 114 C414 100 430 114 414 134" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" opacity="0.7"/><path d="M406 102 C434 82 458 102 434 130" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" opacity="0.45"/></svg>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
const S = {
  status: null, mining: null, health: null, myAccount: null,
  history: null, marketplace: null,
  lastUpdate: 0, connected: false, page: 'dashboard',
  _renderedPage: null,
};
const API = location.origin;
const TOTAL_SUPPLY = 1000000000;
const QUANTA_PER_BAUD = 1000000000000000000n;

// ─── Helpers ────────────────────────────────────────────────────────────────
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function fmt(n) {
  if (n === undefined || n === null) return '—';
  return Number(n).toLocaleString();
}

function fmtBaud(quanta) {
  if (!quanta) return '0';
  const b = BigInt(quanta);
  const whole = b / QUANTA_PER_BAUD;
  const frac = b % QUANTA_PER_BAUD;
  if (frac === 0n) return whole.toLocaleString();
  const fracStr = frac.toString().padStart(18,'0').replace(/0+$/,'');
  return `${whole.toLocaleString()}.${fracStr.slice(0,6)}`;
}

function fmtUptime(ms) {
  if (!ms) return '0s';
  const s = Math.floor(ms/1000), m = Math.floor(s/60), h = Math.floor(m/60), d = Math.floor(h/24);
  if (d > 0) return `${d}d ${h%24}h ${m%60}m`;
  if (h > 0) return `${h}h ${m%60}m ${s%60}s`;
  if (m > 0) return `${m}m ${s%60}s`;
  return `${s}s`;
}

function shortAddr(a) {
  if (!a || a.length < 16) return a || '';
  return a.slice(0,8) + '…' + a.slice(-8);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const t = $('#copy-toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── API ────────────────────────────────────────────────────────────────────
async function fetchJSON(path) {
  try {
    const r = await fetch(API + path);
    if (!r.ok) throw new Error(r.statusText);
    return await r.json();
  } catch(e) { return null; }
}

async function refreshData() {
  const [status, mining, health] = await Promise.all([
    fetchJSON('/v1/status'),
    fetchJSON('/v1/mining'),
    fetchJSON('/v1/health'),
  ]);
  S.status = status;
  S.mining = mining;
  S.health = health;
  S.connected = !!status;
  S.lastUpdate = Date.now();

  if (status && status.node_address) {
    S.myAccount = await fetchJSON('/v1/account/' + status.node_address);
  }

  if (['faucet','dashboard','history','bounty'].includes(S.page)) {
    const histData = await fetchJSON('/v1/history');
    S.history = histData ? histData.transactions : [];
  }
  if (S.page === 'marketplace') {
    S.marketplace = await fetchJSON('/v1/marketplace') || [];
  }

  const dot = $('#status-dot');
  const txt = $('#node-status-text');
  if (S.connected) {
    dot.className = 'status-dot green';
    txt.textContent = `Block #${fmt(status.height)}`;
  } else {
    dot.className = 'status-dot red';
    txt.textContent = 'Disconnected';
  }

  if (S._renderedPage !== S.page) {
    renderPage();
  } else {
    updateLiveData();
  }
}

// ─── Router ─────────────────────────────────────────────────────────────────
function navigate(page) {
  S.page = page;
  S._renderedPage = null;
  $$('#nav a').forEach(a => a.classList.toggle('active', a.dataset.page === page));
  renderPage();
}
window.addEventListener('hashchange', () => navigate(location.hash.slice(1) || 'dashboard'));

// ─── Theme ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('baud-theme', next);
  updateThemeUI();
}
function updateThemeUI() {
  const dark = document.documentElement.dataset.theme === 'dark';
  $('#theme-icon-dark').style.display = dark ? '' : 'none';
  $('#theme-icon-light').style.display = dark ? 'none' : '';
  $('#theme-label').textContent = dark ? 'Light Mode' : 'Dark Mode';
}

// ─── Page Renderer ──────────────────────────────────────────────────────────
function renderPage() {
  const c = $('#content');
  switch(S.page) {
    case 'dashboard': c.innerHTML = renderDashboard(); break;
    case 'mining': c.innerHTML = renderMining(); break;
    case 'wallet': c.innerHTML = renderWallet(); break;
    case 'send': c.innerHTML = renderSend(); break;
    case 'faucet': c.innerHTML = renderFaucet(); break;
    case 'explorer': c.innerHTML = renderExplorer(); break;
    case 'marketplace': c.innerHTML = renderMarketplace(); break;
    case 'bounty': c.innerHTML = renderBountyBoard(); break;
    case 'history': c.innerHTML = renderHistory(); break;
    case 'help': c.innerHTML = renderHelp(); break;
    default: c.innerHTML = renderDashboard();
  }
  if (S.connected) S._renderedPage = S.page;
}

// ─── Live Data Updates ──────────────────────────────────────────────────────
function _set(id, text) { const el = document.getElementById(id); if (el && el.textContent !== String(text)) el.textContent = text; }
function _setHTML(id, html) { const el = document.getElementById(id); if (el) el.innerHTML = html; }
function _setWidth(id, pct) { const el = document.getElementById(id); if (el) el.style.width = pct + '%'; }

function updateLiveData() {
  switch(S.page) {
    case 'dashboard': updateDashboard(); break;
    case 'mining': updateMining(); break;
    case 'history': updateHistory(); break;
    case 'marketplace': updateMarketplace(); break;
  }
}

async function submitTransfer() {
  const secret = $('#tx-secret').value.trim();
  const to = $('#tx-to').value.trim();
  const amountStr = $('#tx-amount').value.trim();
  const nonce = $('#tx-nonce').value.trim();
  const memo = $('#tx-memo').value.trim();
  const el = $('#tx-result');
  if (!secret || !to || !amountStr || nonce === '') { el.innerHTML = '<div class="alert alert-error">Please fill in all required fields</div>'; return; }

  const amountFloat = parseFloat(amountStr);
  if (isNaN(amountFloat) || amountFloat <= 0) { el.innerHTML = '<div class="alert alert-error">Please enter a valid amount</div>'; return; }
  const wholeBaud = BigInt(Math.floor(amountFloat));
  const fracPart = amountFloat - Math.floor(amountFloat);
  const fracQuanta = BigInt(Math.round(fracPart * 1e18));
  const amountQuanta = (wholeBaud * QUANTA_PER_BAUD + fracQuanta).toString();

  el.innerHTML = '<div class="alert alert-info">Signing and submitting…</div>';
  try {
    const resp = await fetch(API + '/v1/sign-and-submit', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ type: 'Transfer', secret, to, amount: amountQuanta, nonce: parseInt(nonce), memo: memo || null, chain_id: S.status ? S.status.chain_id : 'baud-mainnet' })
    });
    const data = await resp.json();
    el.innerHTML = resp.ok
      ? `<div class="alert alert-success">Transaction submitted!<br><span class="mono">${data.tx_hash}</span></div>`
      : `<div class="alert alert-error">${escapeHtml(data.error || 'Submission failed')}</div>`;
  } catch(e) { el.innerHTML = `<div class="alert alert-error">${escapeHtml(e.message)}</div>`; }
}

  const el = $('#proposal-lookup-result');
  if (!id) { el.innerHTML = '<div class="alert alert-error">Enter a proposal ID</div>'; return; }
  el.innerHTML = '<div class="alert alert-info">Looking up…</div>';
  try {
    const resp = await fetch(API + '/v1/proposal/' + encodeURIComponent(id));
    const data = await resp.json();
    if (!resp.ok) { el.innerHTML = `<div class="alert alert-error">${escapeHtml(data.error)}</div>`; return; }
    el.innerHTML = `<div class="card" style="background:var(--bg1)"><div class="table-wrap"><table><tbody>
      <tr><td style="color:var(--text3)">ID</td><td class="mono" style="word-break:break-all">${escapeHtml(data.id)}</td></tr>
      <tr><td style="color:var(--text3)">Status</td><td><strong>${escapeHtml(data.status)}</strong></td></tr>
      <tr><td style="color:var(--text3)">Proposer</td><td class="mono" style="word-break:break-all">${escapeHtml(data.proposer)}</td></tr>
      <tr><td style="color:var(--text3)">Title</td><td><strong>${escapeHtml(data.title)}</strong></td></tr>
      <tr><td style="color:var(--text3)">Description</td><td>${escapeHtml(data.description)}</td></tr>
      <tr><td style="color:var(--text3)">Votes For</td><td style="color:var(--green)">${data.votes_for}</td></tr>
      <tr><td style="color:var(--text3)">Against</td><td style="color:var(--red)">${data.votes_against}</td></tr>
      <tr><td style="color:var(--text3)">Deadline</td><td>${data.voting_deadline}</td></tr>
    </tbody></table></div></div>`;
  } catch(e) { el.innerHTML = `<div class="alert alert-error">${escapeHtml(e.message)}</div>`; }
}

async function lookupReputation() {
  const addr = $('#rep-lookup-addr').value.trim();
  const el = $('#rep-lookup-result');
  if (!addr) { el.innerHTML = '<div class="alert alert-error">Enter an address</div>'; return; }
  el.innerHTML = '<div class="alert alert-info">Looking up…</div>';
  try {
    const resp = await fetch(API + '/v1/reputation/' + encodeURIComponent(addr));
    const data = await resp.json();
    if (!resp.ok) { el.innerHTML = `<div class="alert alert-error">${escapeHtml(data.error)}</div>`; return; }
    const avg = data.average_score !== null ? data.average_score.toFixed(1) : 'N/A';
    el.innerHTML = `<div class="card" style="background:var(--bg1)"><div class="table-wrap"><table><tbody>
      <tr><td style="color:var(--text3)">Address</td><td class="mono" style="word-break:break-all">${escapeHtml(data.address)}</td></tr>
      <tr><td style="color:var(--text3)">Avg Score</td><td><strong style="color:var(--primary)">${avg}</strong></td></tr>
      <tr><td style="color:var(--text3)">Total Score</td><td>${data.total_score}</td></tr>
      <tr><td style="color:var(--text3)">Ratings</td><td>${data.rating_count}</td></tr>
      <tr><td style="color:var(--text3)">Successful</td><td style="color:var(--green)">${data.successful_jobs}</td></tr>
      <tr><td style="color:var(--text3)">Failed</td><td style="color:var(--red)">${data.failed_jobs}</td></tr>
    </tbody></table></div></div>`;
  } catch(e) { el.innerHTML = `<div class="alert alert-error">${escapeHtml(e.message)}</div>`; }
}

async function submitAgentRegister() {
  const secret = $('#agent-secret').value.trim();
  const name = $('#agent-name').value.trim();
  const endpoint = $('#agent-endpoint').value.trim();
  const capStr = $('#agent-capabilities').value.trim();
  const nonce = $('#agent-nonce').value.trim();
  const el = $('#agent-result');
  if (!secret || !name || nonce === '') { el.innerHTML = '<div class="alert alert-error">Secret key, name, and nonce are required</div>'; return; }
  const capabilities = capStr ? capStr.split(',').map(c => c.trim()).filter(c => c) : [];

  el.innerHTML = '<div class="alert alert-info">Signing and submitting…</div>';
  try {
    const resp = await fetch(API + '/v1/sign-and-submit', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ type: 'AgentRegister', secret, name, endpoint: endpoint || '', capabilities, nonce: parseInt(nonce), chain_id: S.status ? S.status.chain_id : 'baud-mainnet' })
    });
    const data = await resp.json();
    el.innerHTML = resp.ok ? `<div class="alert alert-success">Agent registered!<br><span class="mono">${data.tx_hash}</span></div>` : `<div class="alert alert-error">${escapeHtml(data.error)}</div>`;
  } catch(e) { el.innerHTML = `<div class="alert alert-error">${escapeHtml(e.message)}</div>`; }
}

async function requestFaucet() {
  const address = document.getElementById('faucet-address').value.trim();
  const el = document.getElementById('faucet-result');
  if (!address) { el.innerHTML = '<div class="alert alert-error">Please enter your BAUD address</div>'; return; }
  if (!/^[0-9a-fA-F]{64}$/.test(address)) { el.innerHTML = '<div class="alert alert-error">Invalid address. Must be a 64-character hex string.</div>'; return; }

  el.innerHTML = '<div class="alert alert-info">Requesting BAUD…</div>';
  try {
    const resp = await fetch(API + '/v1/faucet', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ address }) });
    const data = await resp.json();
    el.innerHTML = resp.ok
      ? `<div class="alert alert-success">Sent 10 BAUD to your address!<br><span class="mono" style="font-size:.82em">${escapeHtml(data.tx_hash || data.message || 'Success')}</span></div>`
      : `<div class="alert alert-error">${escapeHtml(data.error || 'Request failed')}</div>`;
  } catch(e) { el.innerHTML = `<div class="alert alert-error">Network error: ${escapeHtml(e.message)}</div>`; }
}

// ─── Init ───────────────────────────────────────────────────────────────────
(function init() {
  const saved = localStorage.getItem('baud-theme');
  if (saved) document.documentElement.dataset.theme = saved;
  updateThemeUI();
  const page = location.hash.slice(1) || 'dashboard';
  navigate(page);
  refreshData();
  setInterval(refreshData, 2000);
})();
</script>
