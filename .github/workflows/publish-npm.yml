name: Publish MCP Server to npm

# Requires NPM_TOKEN secret (Classic Automation token):
#   1. Create an npm account at https://www.npmjs.com/signup
#   2. Go to Access Tokens → Generate New Token → Classic Token
#   3. Select type "Automation" (bypasses 2FA for CI/CD)
#   4. Add as repo secret: Settings > Secrets > Actions > New > NPM_TOKEN

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Install and publish
        run: |
          cd mcp-server
          npm ci
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
