name: Publish Python SDK to PyPI

# Requires PyPI Trusted Publisher setup:
#   1. Create a PyPI account at https://pypi.org/account/register/
#   2. Create the project: https://pypi.org/manage/account/publishing/
#   3. Add trusted publisher with:
#      - Owner: NullNaveen
#      - Repository: Baud
#      - Workflow: publish-pypi.yml
#      - Environment: pypi

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          cd sdk/python
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
