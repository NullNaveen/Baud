<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="b-grad" x1="160" y1="100" x2="360" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8deff"/>
    </linearGradient>
    <linearGradient id="signal-grad" x1="340" y1="120" x2="400" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)"/>
  <!-- Subtle inner glow -->
  <rect x="8" y="8" width="496" height="496" rx="92" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Letter B - vertical spine -->
  <rect x="148" y="108" width="36" height="296" rx="18" fill="url(#b-grad)"/>
  <!-- Top serif/base -->
  <rect x="130" y="108" width="72" height="32" rx="8" fill="url(#b-grad)"/>
  <!-- Middle serif/base -->
  <rect x="130" y="240" width="72" height="32" rx="8" fill="url(#b-grad)"/>
  <!-- Bottom serif/base -->
  <rect x="130" y="372" width="72" height="32" rx="8" fill="url(#b-grad)"/>
  <!-- Top bowl of B -->
  <path d="M184 116 H260 C310 116 348 150 348 192 C348 234 310 268 260 268 H184"
        fill="none" stroke="url(#b-grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom bowl of B (slightly wider) -->
  <path d="M184 248 H272 C328 248 370 286 370 332 C370 378 328 412 272 412 H184"
        fill="none" stroke="url(#b-grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Signal dot - represents the "baud" data rate / connectivity -->
  <circle cx="380" cy="130" r="22" fill="url(#signal-grad)"/>
  <!-- Signal arcs - communication waves emanating from the B -->
  <path d="M394 114 C414 100 430 114 414 134" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <path d="M406 102 C434 82 458 102 434 130" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
  <path d="M418 90 C452 64 484 90 454 126" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
</svg>